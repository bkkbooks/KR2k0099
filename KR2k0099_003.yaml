body:
  text: 江城名蹟巻三新建陳宏緒撰證今一洪都明初壬寅嵗髙皇帝定洪都命都督官朱文正增拓舊城周二千七十丈有竒髙二丈九尺有竒建七門東曰永和又名澹臺以門内有澹臺墓舊名壇頭門為仙人黄紫庭臺壇址東南曰順化舊名琉璃以門内延慶寺有晋建武時琉璃佛像在焉南曰進賢舊名撫州俱以道路相通得名又曰望仙以漢梅尉故廨在門外又南曰惠民輓輸至惠民倉其路由此舊名寺步以近隆興寺也西南曰廣潤舊名柴步又名橋步西曰章江以在江濵故名舊曰昌門孫䇿遣虞翻與郡守華歆交語于此北曰徳勝舊望雲門李綱移築于此又名新城明初御製周顛仙碑云朕于南昌東華門道左見男子一人拜于道傍朕謂左右曰此何人也左右皆曰顛人按吾郡城門未聞有東華之名豈此時永和門亦稱東華門與章江在郡西章江門外水經所謂贑水出豫章是也控引衆流總成一川後漢郡國志曰贑有豫章水雷次宗云似因此水為其地名雖十川均流而此流最遠故獨受名焉十川者贑廬章淦旴蜀餘鄱僚循為十川也緒按豫章自以樹得名次宗之言未為覈實蜀江在新建西南六十里一名筠河自瑞州髙安入境合象牙潭水入章江亦名錦江述異紀云漆澄釣于蜀水水中忽得金鎻引之不絶俄頃盈舟既而有物出水上黒色不見首尾舟人驚惶惟澄略不變色澄豫章人也旴水出南城縣西北流逕南昌縣西南注贑水東湖在城内亦名太湖水經注云東太湖十里二百二十二步北與城齊南縁廻折至南塘水通大江増减與江水同湖至清深魚甚肥美沿隄舊皆植栁名萬栁隄亦曰萬金隄唐李紳詩菱謌罷唱鷁舟廻雪鷺銀鷗左右來霞散浦邊雲錦截月昇湖面鏡波開魚驚翠羽金鱗躍蓮脱紅衣紫菂摧浦口值春偏悵望數株臨水是寒梅啟禎間承平既久吾郡又為藩封盛地諸王子公侯暨士大夫流連光景縱意遊觀忽有開浚東湖之舉一時畵舫蘭橈珠簾翠幙幾與西湖争勝予有東湖詞云萬古空烟月今朝錦纜叢栁翻蘇圃浪鳥弄杏花風新調呉吹滿長橋夜火通滕王歌舞後樂事聖朝工又繡幕流蘇遶誰家翠袖過衣香勾舞蝶低笑出深荷載酒輕橈緩聴簫寂坐多尚饒草𤣥客鷗外獨編摩又競架臨湖屋朱欄侈此時兩齋誇秀倩三笠較幽竒洗研頻衝雨論文每傍祠無人清賞處曉露獨離離又不怕魚鹽棹沿洄盡勝流西江新韻士寜邸舊諸侯挾瑟蒹葭㟁垂鞭鳬雁洲為懽苦未足醉卧數更籌又孺子祠前水斜過吏隱亭昔垂髙士釣今伴酒人星燈滿盂蘭社魚依橋甕萍幾翻看競渡虹影掛香軿又粉垣長帶月遥映石欄烟一派瓊瑶蕩四時風露妍樓懸東壁迥樹傍斗珠連此地鯨吞快尊空覔釀泉辛稼軒送元濟之歸豫章詞名江神子有二月東湖湖上路官塗桞嫩野梅香之句南渡以後東湖風景彷彿在目前又不特近代遊觀之盛為可誇也今但荒草萋迷求一艇一橈不可復得矣明宛平余奕正字司直著天下金石志有唐崔璹書洪州東湖記蓋東湖亭記也遺漏一字遂致失實崔璹又有洪州刺史王守真石碑今俱不知消沉何處三湖九津在府城内舊東湖金分為三曰北湖曰東湖曰西湖城内之水滙焉湖水出城下水關橋置内外閘湖強則直放而西逹于江江湖俱強則閉外閘使章水不得侵入乃開内閘引湖水逹濠遶廣潤章江徳勝永和四門而過之東歸蜆子湖艾溪湖出牛尾閘趨楊家灘入鄱陽湖城内别有九津以殺三湖之勢廣潤門東曰五行津東南曰五事津即水關橋惠民門下曰八政津進賢門西曰五紀津順化門北曰歸極津永和門北曰三徳津徳勝門下曰稽疑津章江門北曰庻徴津南曰五福津水各由津以歸濠焉舊傳東湖尾閭龍精守之中有坎諺云海眼深不可測江漲難于堤扞韋公未遇時適龍精化為白黿為漁者所得韋見而買置江中後韋官此土龍精見夣曰予東湖之龍曩者魚服䝉公恩救無由仰報公將築東湖之尻予且徙居象牙潭以成公績然恐有他龍復據必置城隍廟内四金人用四死囚同填其中乃永無敗韋公異日如其言即今之五事津也韋公疑是韋丹豫章郡城雄跨一省山之鎮曰西山屏障西北望曰羅山属豐城屹時東南其大川西曰章江東曰撫河滙為巨浸鄱陽湖大脈三支中為南昌分豐城東河之東為進賢西河之西為新建奉靖寜武此其大概也章江堤在府城西章江門上下成化間廵視大理卿夏時正因江水嚙􅜌廹于城濠捐官銀伐石修砌未竟成化十二年知府祝瀚繼成其績北起龍興觀南至南浦橋周公堤在府城北徳勝門外嘉靖四十二年廵撫都御史周相因江水衝沒民居括所属鍰金伐石砌􅜌民徳之立亭于北關上名曰周公亭南塘堤在郡城西南斗門外漢太守張躬築堤扞江唐刺史韋丹重修亦名韋公堤唐陸龜䝉南塘曲妾住東湖下郎居南浦邊閒臨烟水望認得采菱船南昌府學自晉至唐皆建于郡西宋治平二年知洪州施元長遷于洗馬池東明堂路西即今之儒學也舊志止載元虞集興學頌而遺前宋余靖之記與南宋楊萬里之記予巳采入于藝文志又元貞元年呉文正公澄遊豫章西山憲幕長郝文仲明迎先生入城請學易清河元文敏公明善時屈在行省掾見先生問春秋大義數十條願為弟子受業終其身城中居官之人請先生至郡學為説修己以敬一章反復萬餘言聴者千百人多所感發按此乃吾郡學官佳話今人但知陸子静白鹿洞故事而巳孔子既沒魯哀公誄為尼父漢平帝元始元年謚褒成宣尼父後魏文帝大和中改謚文宣尼父後周宣帝大象二年追封鄒國公隋文帝贈先師尼父唐髙宗乾封元年贈太師武后封隆道公𤣥宗謚文宣王宋真宗加謚至聖文宣王父叔梁紇為齊國公元加封大成至聖文宣王加齊國公為啟聖王明嘉靖十年改稱至聖先師孔子改啟聖王為啟聖公自十哲而下及門弟子舊有封號者俱改稱先賢某子餘配享者稱先儒某子洪武癸酉崇仁學訓導羅恢上疏言孔子廟廷從祀者當以道學論當時有若優于宰予論語記有若言行者四皆有禆于世教記宰予者亦四皆見責于聖人宜以有若居十哲而宰予居兩廡疏上不報時皆服其議論之當附載于此宋北山程至道云嘗觀浮屠氏自釋迦佛傳心法與夫講解之宗至于今將二千年而源派譜牒一一可數下至醫巫祝卜百工之技莫不有所師惟吾儒師承之道乃今蔑焉無聞所謂學宫師弟子如適相遇于塗爾盖可嘆也賜書樓在明倫堂北都御史韓雍建髙三丈許藏書其上學士錢習禮有記郡庠司教鐸而稱名臣者豐城朱善鄞縣黄潤玉南昌鍾甬也朱善字備萬以薦辟歴文淵閣大學士有送翰林典籍羅原奎序云洪武十年春善與江西教官同赴召者十有二人而居翰林者惟善與羅氏原奎劉氏仲質三人焉時學士宋公新以承㫖致仕歸里于是善以修撰典誥命原奎與仲質以典籍掌書冊先是内府羣書秘書監實典之九年冬始命移置翰林内直之署實在奉天門之左凡為書數萬巻云南昌縣儒學在東湖之北即故東湖書院也宋嘉定四年通判豐有俊得李寅涵虚閣故址遂請于權府計使胡槻創書院以舘四方㳺學之士後計使滕強恕兼府事稍徙東二百餘步元元綂中縣尹程大度更于撫州門外創縣學明洪武初知縣黄徳銘遷建于此景泰四年廵撫都御史韓雍重修并于明倫堂後創魁星樓正徳末焚燬隨復建萬厯間知縣林應訓鬻民居并嚴氏没産増拓東隅三十五年知府盧廷選知縣周起元濬學前湖址四圍砌石成堤以壯學宫形勝近燬于兵廵撫兵部尚書兼都御史張公朝璘督學楊公兆魯捐俸重建明胡儼記略云豫章之學宗雙峯饒氏雙峯得之李𢎞齋𢎞齋則遡紫陽朱子以續夫濓洛之傳者也初勉齋黄公為新建丞與𢎞齋講學于兹極論道徳性命之㫖當是時雙峰實從𢎞齋而與有聞焉雙峰之學傳之徽庵程氏徽庵之學傳之呉文正公其所以開來學者實肇于此諸君子之接踵從㳺者可不知所重哉洪武已夘南昌縣儒學掘泮池得二石獅子無鼻學傍兒戯以硃塗之是年劉瑞王髙同舉並坐方孝孺事劓鼻而終新建縣儒學在東湖之北即故宗濓書院也初望雲門外即今徳勝門龍沙岡有宗濓精舍宋淳祐二年知隆興府江萬里建祀濓溪周子元元綂初縣尹薛方即其地建縣學後别創宗濓書院于東湖上明洪武五年改書院為儒學景泰四年廵撫都御史韓雍檄修并創宗濓書樓萬厯間知府范淶知縣余夢鯉戴士衡増葺三十五年知府盧廷選知縣呉嘉謨濬學前湖址四周砌石成堤以壯學宫形勝又創梅子真亭于湖之西偏以固水口天啟五年知縣龍文光再新之𢎞緒為記歲戊子燬于兵亂提學僉事武進楊公兆魯請于巡撫侍郎某公廷佐各捐俸金贖鍰并檄郡丞高公培重建楊有修學碑記胡頥菴先生儼學記云宣徳七年廵撫吏部侍郎趙公合藩臬及郡邑長吏慨然以教育人才為事聿新學宫自禮殿逹于門廡自講堂及于齋舍暨藏修之室靡不輪奐増美傑出于湖光天影之間按所謂趙公者乃杭州趙公新也由太學生歴官至吏部侍郎江右以少宰廵撫者僅公一人初莅吾省尚循朱文正故事稱鎮守後乃改為廵撫至成化間原傑金紳亦以侍郎至則并稱廵視云江丞相祠舊在新建縣學東廡下祀宋丞相江萬里城隍廟在府東南直深三十八丈横濶二十六丈舊廟在郡子城東洪武三年知府趙文奎移建于此正徳間知府胡本惠重修張房傑記景泰間知府蘓仕宣修韓楊記萬厯間知府范淶復修兩廡淶自記文多俱不録府城隍相傳為漢灌嬰考通志西漢初嬰嘗定豫章始築郡城故祀以為神即今灌城鄉實始于此漢髙帝六年封潁隂侯南唐時封輔徳王宋淳祐八年封忠惠王洪武三年令天下城隍廟止稱某府州縣城隍之神悉革封號塑像凡祭風雲雷雨山川則神配享祭厲壇則神主之載在祀典南昌諸生劉端世稱古岡先生為諸生時肄業邑校偶夜半過城隍廟廟内神語曰過門者乃忠臣也令舉火送之直扺學宫而退次日司廟門者徃邑校詢知為端拜而賀之端以為誕後果驗江西左轄黄公卿清白自持卒于官市人有夢鼓吹迎新城隍者諦觀之乃方伯黄公也公卒適符所夢之期果爾則城隍非復灌將軍矣社稷壇在徳勝門外俗稱北壇洪武間知府趙文奎自城西北遷建歲春秋二仲月上戊日致祭風雲雷雨山川壇在進賢門外俗稱南壇洪武間知府趙文奎改建歳春秋二仲月上已日致祭郡厲壇在徳勝門外洪武三年始頒降禮制每歲春清明秋七月十五日冬十月一日致祭旗纛廟每歲霜降都司致祭永寜寺一名上藍寺在崇梵坊初郡故子城西有蛟井在梁豫章王師葛鱏宅東南天監中龍闘井中豫章王蕭綜造大佛鎮之鱏復于太清初捨宅名大佛寺唐開元間改為開元寺有唐明皇銅像號真容殿大厯間馬祖建道塲于此大中間燬後南平王鍾傳奏復建為上藍院以居上藍山僧令超宋真宗時改承天寺政和間改能仁寺明初以寺址剏南昌縣治遷寺于元故帝師殿即鍾傳之故居景泰間更今名為祝釐習禮之所有藏經閣萬厯間建江西道一禪師漢州什邡人也姓馬氏本邑羅漢寺出家形容竒異牛行虎視引舌過鼻足下有二輪文㓜歲依資州唐和尚落髪受真于渝州圓律師唐開元中習禪定于衡嶽山中遇讓和尚同參六人惟師宻受心印始自建陽佛跡嶺遷至臨川次至南昌龔公山大厯中𨽻名于鍾陵開元寺時連帥路公嗣恭親授宗㫖由是四方學者雲集座下入室弟子一百三十九人各為一方宗主轉化無窮師于貞元四年正月中登建昌石門山于林中經行見洞壑平坦謂侍者曰吾之朽質當于來月歸兹地矣言訖而回既而小疾院主問和尚近日尊候如何師曰日面佛月面佛二月一日沐浴跏趺入寂元和中謚大寂禪師塔曰大莊嚴百丈山懐海禪師與西堂智藏南泉普願同號入室時三士為角立焉明州大梅山法常禪師初參大寂問如何是佛寂曰即心即佛師即大悟遂之四明梅子真隱處縛茅燕處馬祖聞師住山乃令僧問和尚見馬大師得箇甚麽便住此山師曰大師向我道即心即佛我便向這裏住僧曰大師近日佛法又别師曰如何僧曰又道非心非佛師曰這老漢惑亂人任他非心非佛我祗管即心即佛其僧回舉告馬祖祖曰梅子熟也伊閟伏牛山自在禪師參祖求發明心地後居伏牛山上堂曰即心即佛是無病求藥句非心非佛是藥病對治句僧問如何是脱灑底句應曰伏牛山下古今傳亮座主蜀人也頗讀經論因參馬祖祖問見説座主大講得經論是否師曰不敢祖曰將甚麽講師曰將心講祖曰心如工技兒意如和伎者怎講解得師抗聲曰心既講不得虚空講得否祖曰却是虚空講得師不肯服便出將下階祖召曰座主師回首祖曰是甚麽師豁然大悟便禮拜祖曰這鈍根阿師禮拜作麽師曰某常所講經論將謂無人及得今日被大師一問平生功業一時氷釋禮謝而退乃隱于洪州西山更無消息陸放翁言其從子慧綽為浮屠傳豫章西山香城寺之傍有埜人身被緑毛每雨霽多坐石上暴日見人輙避去追之不可及有識者曰此馬祖弟子亮座主也襄州居士龎藴者衡州衡陽縣人字道𤣥從石頭來參馬祖問曰不與萬法為侣者是甚麽人祖曰待汝一口吸盡西江水即向汝道士于言下頓悟𤣥㫖乃留駐參承二載有偈曰有男不婚有女不嫁大家團欒頭共説無生話自爾機辨迅㨗諸方嚮之已上南嶽下二世馬祖一禪師法嗣鄧州丹霞天然禪師本習儒業將入長安應舉方宿于逆旅忽夢白光滿室占者曰解夢之祥也遇禪者問曰仁者何徃曰選官去禪者曰選官何如選佛曰選佛當徃何所禪者曰今江西馬大師出世是選佛之塲仁者可徃遂直造江西纔見馬祖以手拓撲頭額祖顧視良久曰南嶽石頭是汝師也遽抵石頭剃髮又為説戒再徃江西謁馬祖未參禮便入僧堂騎聖僧頭而坐時大衆驚愕遽報馬祖祖躬入堂視之曰吾子天然師即下地禮拜曰謝師賜法名因名天然令超禪師唐末住髙安上藍寺及鍾傳為南平王迎至洪州住開元寺仍以上藍名焉僧問如何是上藍本分事師曰不從千聖借豈向萬機求曰祗如不借不求時何如師曰不可拈放汝手裏問善財見文殊後為甚麽却住南方師曰學凴入室知乃通方曰彌勒為甚麽却遣見文殊師曰道廣無涯逄人不盡至唐大順正月初告衆曰吾本約住此十年今化事既畢當即行矣齋畢聲鐘端坐長徃謚元貞禪師禾山無殷禪師從雪峰出家依之後具謁九峰許以入室南唐李主昪召見特䝉禮遇嗣主璟賜號澄源命居洪州翠巖時上藍亦虚其室仍命師來徃闡化建隆元年示寂有甘露被樹皓鶴盤空之異上藍院光寂禪師青原下稱心明之法嗣也上堂横按柱杖召大衆曰還識上藍老漢麽眼似朩突口如扁擔無問精粗不知鹹淡與麽住持千百過犯諸禪徳還有為山僧懴悔底麽良久曰氣急殺人卓柱杖下堂法燈禪師住南昌上藍雲居齊禪師徃依之法燈便知莊司燈偶見齊呼曰每見祖師西來意話莊司如何商畧齊曰不東不西燈曰若與麽㑹了無交涉曰未審尊意如何燈良久曰西來有甚意便去齊于是頓悟其㫖上藍寺石閣貯大藏經一部萬厯初古心禪師道安所建也閣有接引佛像範金為之崇十有六尺莊嚴甲于諸刹閣後有老君殿或謂無生法侣而祀柱下史殊為不倫予考仙傳吕巖始在襁褓馬祖見之曰此兒骨性不凢自是風塵表物他時遇廬則居見鐘則扣留心記取後遊于廬山始遇大龍真人傳天劍遁法因號純陽子咸通中舉進士時年六十四偶遊長安酒肆遇羽士狀貎竒古乃鍾離權也遂授以靈丹并靈寳異法至今在世行化度人是則純陽亦馬祖授記而登仙此地固不獨為選佛之塲也老子之祀其或以純陽之故歟五燈㑹元載純陽為青原下八世黄龍機法嗣嘗以偈呈黄龍云棄却瓢囊碎却琴如今不戀汞中金自從一見黄龍後始覺從前錯用心其解悟超脱如此惜遇馬祖時方在襁褓之中悠悠百餘年尚不免飛劍一錯洪州太守許式參洞山得正法眼一日與泐潭澄上藍溥坐次澄問聞郎中道夜坐連雲石春栽帯雨松當時答洞山甚麽話公曰今日放衙早澄曰問答泗州大聖在揚州出現底是否公曰别㸃茶來澄曰名不虚傳公曰和尚早晚回山澄曰今日被上藍覷破溥便喝澄曰須是你始得公曰不奈船何打破戽斗明太祖入南昌城微行至能仁上藍禪寺周遊細玩傍若無人僧叩其姓名不答固叩之乃題殿壁曰殺盡江西數萬兵腰間寳劍血留腥野僧不識山河主只管叨叨問姓名題畢擲筆竟出一雲遊僧見而磨去更題曰御筆題詩不敢留留時惟恐鬼神愁好將法水頻頻洗猶有毫光射斗牛翌日上欲加罪此寺見所題詩曰寺固有人遂赦僧衆唐時寺僧栖隱少而端麗神解天然出塵後服勤于學深入毗尼壼奥又兼擅風雅每于花朝月夕晚照髙秋鍊句成聫合篇為集徃徃遒健瀏亮散在人口居常與貫休處黙修睦為詩道之友處士沈顔曹松張凝陳昌符皆其倡酧之友也詩集百餘首曰桂峰集近代等可禪師行溥吾邑西山農家生子夢老僧持菊至室中曰我貫休也遂名休兒五六歲出家于此其師富資財等公獨好筆墨作小詩自喜遂惡之蜀僧過永寜寺等公奪其扇題曰老師問我西來意般若波羅上大人蜀僧大竒之已遍遊名勝著北遊草五百餘首舟過泖湖遇盗并其詩盗去等公曰吾生平悔作詩偷兒愛我後友人劉文學不息梓其僅存之稿百十五首等公自署曰棗堂剰語吾宗伯機選刻詩慰集中東山寺唐慧禪道塲宋大中祥符中禪僧修演建寺寺有卧如來像今并入永寜寺大安寺在城北初名東寺有鐵香爐髙六尺許識云赤烏元年造晉時西域僧安世髙來止于此遂名大安寺一云晉隆安二年鎮西將軍謝尚施宅為之唐武徳間改名宣明寺大中間又改名普濟寺明初重建復今額安清字世髙安息國王子也㓜以孝行見稱又加志業聰敏刻意好學外國典籍及七曜五行醫方異術乃至鳥獸之聲無不綜逹嘗行見羣燕忽謂伴曰燕云應有送食者頃之果有至焉衆咸竒之㒞異之聲早被西域讓國出家修道博曉經藏尤精阿毘曇學既而逰方遍歴諸國以漢桓初年到中夏通習華言宣譯諸經多有神跡自稱先身己經出家有一同學多嗔值施主稍不稱意輙懟恨之髙屢加訶諫終不悛改如此二十餘年乃與同學辭訣云我當徃廣畢宿世之負卿明經精勤不在吾後而性多恚怒終當受惡形我若得道必當相度既而適廣州值冦亂道逄一少年唾手挾刃曰真得汝矣髙笑曰我宿命負卿遠來相償卿之忿怒故是前世時意也乃延頸受刃容無懼色少年殺之觀者填陌莫不駭其竒異後神機還原為安息王太子遊化中國值靈帝末關洛擾亂乃振錫江南云我當過廬山度習同學行逹䢼亭湖廟此廟舊有威靈商旅祈禱能分風送船上下各無留滯嘗有乞神竹者未許輙取舫即覆没竹還本處自是舟人敬憚莫不懾影髙同旅三十餘船奉牲請福神乃降祝曰舫有沙門可便呼上客咸驚愕請髙入廟神告髙曰吾昔外國與子俱出家學道好行布施而性多嗔怒今為䢼亭廟神周迴千里並無所治以布施故珍玩甚豐以嗔怒故墮此補報今見同學悲欣交集夀盡旦夕而醜形長大若于此捨命穢汚江湖當度西山澤中此身滅後恐墮地獄吾有絹千疋并雜寳物可為立法營塔使生善處也髙曰遠來相度何不出形神曰形極醜異衆人必懼髙曰但出衆不怪也神從牀後出頭乃是大蟒不知尾之長短至髙膝邊髙向之梵語數番讃嘆數次蟒悲淚如雨須臾還隱髙即取絹物辭别而去舟侣颺㠶蟒復出身登山而望衆人舉首然後乃滅倐忽之頃便逹豫章即以廟物為造東寺髙向暮渡江此時忽有一少年上船長跪髙前受其呪願忽然不見髙謂船人曰兹之少年即䢼亭廟神得離惡形矣于是廟神無復靈驗後人于西山澤中見一死蟒頭尾數里今潯陽郡蛇村是也普賢寺在惠民門内晉故禪居寺隆安四年武昌太守熊鳴鵠一作鳴鶴捨宅建至唐神龍元年改為隆興院亦稱隆興寺于是惠民門亦曰寺步門以其與寺相近也㑹昌間觀察使裴休迎黄蘖山希運禪師居此南唐保大二年袁州刺史邊鎬以鐵二十萬斤鑄普賢乗白象寺遂以普賢名明永樂中重建黄蘖希運禪師閩人也㓜于洪州黄蘖山出家額間隆起如珠音辭朗潤志意沖澹逰京師因人啟發乃徃㕘百丈一日丈問師甚麽去處來曰大雄山下採菌子丈曰還見大蟲麽師便作虎聲丈拈斧作斫勢師即打丈一摑丈冷冷而笑便歸上堂曰大雄山下有一大蟲汝等諸人也須好看百丈老漢今日親遭一口裴相國鎮鍾陵建大禪院請師説法以師酷愛舊山還以黄蘖名之公一日拓一尊佛于師前跪曰請師安名師名曰裴休公應諾師曰與汝安名竟公禮拜一日請師至郡以所解一編示師師接置于座略不披閲良久曰㑹麽裴曰未測師曰若便恁心㑹得猶為較勝若便形于紙墨何有吾宗裴乃贈詩一章曰自從大士傳心印額有圓珠七尺身挂錫十年栖蜀水浮杯今日渡章濵一干龍象隨髙步萬里香花結勝因擬欲事師為弟子不知將法付何人師亦無喜色自爾黄蘖門風勝于江表矣大中四年師寂賜謚斷際禪師唐鍾陵隆興寺僧清徹不知何許人也周逰津肆宻䕶根門初新呉開元寺北院道恒律師深談理致憲宗元和八年癸巳約志著記二十巻亦鳩聚諸家要當之説解南山鈔號集義焉豫章武昌晋陵講士多得此義延慶寺在順化門内晋元帝時得琉璃佛像詔建寺以處之名琉璃寺唐咸通二年觀察使嚴譔表請重建因延慶節奏上改名延慶順治二年燬于兵僧淨鍍復新之南唐徐鉉有延慶寺碑其略云晋元帝即位之歲郡人有耕于東湖之艮隅者獲琉璃像焉其髙三尺其狀殊異守臣上啟詔立寺以處之至唐太和三年文宗以夢寐交感特詔修崇有僧普願者率勵衆力剏造飛閣極髙明之制盡臨觀之美瞻仰之徒勝賞仍在㑹昌沙汰旋復殄夷時有寺住僧神確躬奉端容瘞于堂下大中改制將復修完像遂湮沒求不可得而靈跡所在羣心未㤀咸通二年連帥嚴譔表請重建因紀誕聖之節署為延慶之寺廣明中巢冦亂遂羣賊蜂起三灾所及寺復焚燬光啟二年亷使王師甫即其故址又加營繕自是厥後百載于兹市朝屢更興廢不一及國家奄有寰區恢𢎞教法北藍寺監守寺僧智清推成以化人節用以成務峻其卑庳葺其傾頺改作正殿及廊廡共七間踈楹廣厦雕甍藻棁鎻窓洞户珠網金鋪蹇産鴻紛塗泥煥爛闕政備矣能事畢矣𢎞緒過延慶寺晤成中上人詩十年不過城東寺重構香臺歴幾秋亂後禪燈依約在老來笻杖委蛇遊榴花作雨胭脂冷竹影連雲翡翠浮話到無生諸累盡只難消遣邵平愁浴室寺在永寜寺東相傳馬祖剏建盖沐浴之所也戊已變後子入郭首過其處見荒葛滿塗不勝紛濁之感作江城懷古六十首遂以兹寺為冠予友黎左嚴學使既成和章復作募䟽重新之僧逄祖鑿小池種花環繞額曰醉花池一時名流俱有題詠或謂醉花非僧所宜吕道州不云乎君看池水湛然時何曽不受花枝影上人之醉固即如來之微笑矣繩金塔寺在進賢門外舊名千佛院唐天祐間建有繩金寳塔相傳建塔時掘地得鐵函劍三金瓶舍利三百俗名塔下寺舊有趙松雪碑郡人推為墨寳繩金塔初建時尚在城中舊記稱此塔能厭火災豫章民謡云藤斷葫蘆剪塔圯豫章殘盖謂潮王洲舊有閣與滕閣並峙後忽傾倒于是進賢門外古城如葫蘆形者遂截出在外改作今城矣頃歲戊已之變相輪漸偏不可不加意預防也潘興嗣記塔寺羅漢云西山雲堂院有禪月大師貫休畫十六羅漢像歲旱民奔走山谷間請禱輙應此本天下竒偶數而傳之者未有彷彿予捐俸錢使徧模繩金塔院壁間輙兾民之祈禱者得以便焉市林寺晋泰始六年建今併入塔下寺明呉國倫詩古塔崚嶒萬象蟠西山如鷲捧危欄扶笻漸與彌天近引筏新知覺路寛雙樹影迴平野暮百鈴聲徹大江寒毫光夜夜凌無極併作南州斗氣看章江寺在章江西岸沙井渡口舊名章江禪院宋潘慎修記明洪陽張位記泰定寺在徳勝門外劉上寳斯瑋重建結放生社臨川陳際泰序下泰定寺在龍光寺右石亭寺在章江門外唐時僧靈徹建仰山慧寂禪師于此演教初名大悲寺又名觀音院唐時韋公丹觀察西江與寺僧靈徹為㤀形交常寄徹詩云王事紛紛無暇日浮生冉冉只如雲已為平子歸休計五老峯前必共論徹答云年老身閒無一事麻衣學坐只容身相逄盡道休官好林下何曽見一人後立韋丹遺愛碑于寺左覆以石亭至大中十五年丹子宙復觀察西江奏以為石亭院裴休題額宋政和間廢為觀明初復為寺亦稱石亭觀音院明嘉靖年間廵撫都御史汪𤣥錫再加修葺有殘碑尚存寺左國朝順治十五年廵撫都御史張公朝璘清拓舊基捐貲重剏寺後左右甃砌圍墻前砌石􅜌後建觀音大殿前建鈞天閣與滕王閣並峙左建張公祠右建僧房以延賔客丹艧煥然遊觀接踵并捐置贍田八十餘畝以供香火按僧靈徹生于㑹稽本姓湯氏字澄源與呉興詩僧皎然遊皎然薦之包佶李紓以是上人名由二公而颺而韋公倡和之句尤為世所争傳韋在洪都又有懷西林慧永禪師詩云空山泉落松窓静閒地草生春日遲白髮漸多身未退依依長在永禪師武陽㧞俗之致徃徃形于篇什匪特寄靈徹之句也仰山慧寂通智禪師韶州懷化葉氏子年九歲于廣州和安寺投通智師出家十四歲父母取歸欲與婚娶師不從遂斷手二指跪至父母前誓求正法以答父母劬勞父母乃許再詣通智而得披剃初謁躭源已悟𤣥㫖後參為山遂升堂奥一日有梵師從空而至師曰近離甚處曰西天師曰幾時離曰今早師曰何太遲曰遊山玩水師曰神通遊戯則不無闍黎佛法須老僧始得曰特來東土禮文殊却遇小釋迦遂出梵書貝多葉與師作禮乗空而去自此人號師小釋迦師徃觀音院即石亭寺時出榜云看經次不得問事有師來問詢見師看經旁立而待師巻却經問㑹麽曰某甲不看經怎得㑹師曰汝已後㑹去在其僧到巖頭頭問甚處來曰江西觀音來頭曰和尚有何言句僧舉前話頭曰這個老師我將謂彼故紙埋却原來猶在再遷東平將順寂説偈曰年滿七十七無常在今日日輪正當午兩手攀屈膝言訖以兩手抱膝而終洪州觀音院從顯禪師泉州人僧問如何是觀音家風師曰眼前可取曰忽遇作者來作麽生見侍曰貧家祇如此未必便言歸問久負沒絃琴請師彈一曲師曰作麽生聼其僧側耳師曰賺殺人太平興國中無疾坐化建塔西山明王守仁夜舟泊石亭詩廿年不到石亭寺惟有西山只舊青白拂掛墻僧己去紅欄照水客重經沙村遠樹凝春望江雨孤蓬入夜聼何處故人還笑語東風啼鳥夣初醒總持寺在進賢門内唐開元中建舊名總持院有碑刻乾符二年牒中和五年牒各一通寺内有雷公堂又有龍井祈雨屢驗周益公必大記云乾道庚寅四月泛舟過總持院本唐僧子畋所造畋精太乙術能祈雨乞晴今有井禱求不廢雷堂之後有澹䑓滅明墓洪駒父云史記雖云滅明居楚又有渡江斬蛟之事然豫章非真楚尚可疑也平江亦有澹䑓墓院中老僧年七十及從徐師川遊能寫字鼓琴自總持過講武亭登舟按子畋乃唐僧而盧志云元大徳間僧不知益公録中己有子畋其人矣院中老僧能解冩字鼓琴又與徐師川遊應非尋常衲子今其姓名無傳尤為惋惜吾兄孝亷維謙字仲容讀書寺中時萟髙古人如其文嘗作文誌曰負總持山右逺府治川分東湖嘉樹環之弱葦竹箭蔓草俯仰䝉綴水清以旋日月之光時入而波不波而平王孫甲第雲連笙謌時落西望峻者厭原如鋸蘓公祠漫坁中折㟁而陽漢髙士亭東行數武澹䑓古墓弟子已塟衣冠湖上曲徑深峭行幽峭地立髙美樓以祠見羅李先生是萟也則髙美樓與諸兄弟歲月所得者也移自龍沙故曰龍沙然則予雖面空主持世道之契立矣余雖執萟仁義名節之警心也久矣丁已仲冬陳維謙書仲容與其弟仲來名維恭俱為艾溪工文章敦氣誼之士曩予數過總持見仲容所輯成𢎞以來時萟叠置烏皮連屋蔽牖艾千子文定文待諸選所未及也咸陽一炬灰飛烟滅三百年作者心血遂盡于此為之於邑百福寺在繩金塔之東宋建明熊大司馬明遇詩仙梵曾聞共一堂青牛白象儼西方郊原抱郭開初地鐘鼓繙經供法王花朩禪房春寂寂旃檀寳閣曉蒼蒼門題百福嘉王舊泛作慈雲䕃豫章天寜寺在徳勝門外舊名孝光寺元薩都拉過孝光寺詩云秋日留題翠壁層出山聊聼在山僧肩輿又上沙頭渡隔水人家兩㟁燈薩字天錫元綂中遷閩亷訪司知事詩應作于此時胡元瑞曰天錫誦法青蓮如海嶂連雲起江潮入市流故廬南雪下短褐北風前夜卧千峯月朝飡五色霞朔風吹夜草寒日下邊城句法宏整在大厯元和間殊不多得閩友林祖鼎嘗遇兹寺適有艶婦至寺僧某以目挑之俄擕手入室林見大加詆訶某僧遂出不遜語予過寺題二絶于壁間有禪房寂寂啼烏静紅雨香風動綺羅之句某僧負愧向祖鼎謝過託為洗去後果悔懴前愆精持戒律憶黄魯直袈裟頌云丈夫出家當被壞色衣蜀僧袈裟多似苾蒭尼輕羅縐縠染成春柳絲撩蜂引蝶惟欠遠山眉不意真有遠山眉也吾軰遇此固當金剛弩目以䕶之菩提寺在城東每歲迎春于此太定寺在徳勝門外劉尚寳斯瑋重建結放生社于此每月一舉臨川陳大士有放生㑹序大士不觀釋典獨以儒者愛物之理諄切言之亦足與魯公碑競美也雲棲禪師放生之法不拘時日見即買放于某月下書某日放生若干巨生以個數計細生以觔數計歲終總算存以自考此法最善可免奸人預捕急售附記于此龍光寺在城北龍沙岡三面積沙蜿蜒擁抱南有蓮花池池水澄瑩不受沙侵一郡好為竒勝布政使陸長庚丁繼嗣建公舘于左郡文學結社課藝右為禪堂張公夀朋題曰沙佛居大通禪師説法其中禪師名無來南城人為諸生才名藉甚俄削髮出家持戒精嚴專提楞嚴甚深微妙之㫖慧辨無碍建安豈軒王頻枉駕訪之侍郎徐公作御史李公曰輔皆居士中之髙足也著有大通禪師語録明劉冡宰崧賦龍沙贈友人别云朝出城北門遥見城下沙簌簌鳴北風蕭蕭入人家波陀皓如雪漫漫不可越水落黄金澄天晴紫烟滅别君沙下亭逝此歌揚舲春來倘相憶芳草是中青譚元春詩誰使龍沙立周遭繚作墻古蛟聲嘿嘿野鶴倚荒荒徙去終依寺吹來不礙塘我同遥集士疑信到斜陽龍沙䜟相傳許真君上昇所留其言曰吾仙去後千二百四十年當出弟子八百師在豫章宋潘興嗣詩云五陵無限日宻視龍沙記龍沙雖未合氣象已靈異昔時蛟龍湫半作桑麻地地形帶江轉洲浮有連勢陵谷豈可常淵竇在何歲微生久慕道恬淡輙㤀味愧無及物功碌碌恒匏繋生䝉塵土厚未受神仙祕何時與孤鶴冉冉從此逝應天寺在進賢門内唐啟光元年建一名掬林寺相傳有掬林禪師禱雨大著靈驗因改名應天宋文丞相天祥重新之興福寺在城南宋悟寛禪師講經于此有白蛇來聼圓覺寺在蓼洲晋泰始七年建内有大觀樓張元禎題扁今不存蓼洲即古軥􅑳洲北堂書鈔云豫章城西南有軥􅑳洲去度支步可二里是吕䝉作句鹿大艑處水經注贑水逕谷鹿洲舊作大艑處按谷鹿即軥􅑳之譌廣雅云船也音鉤鹿大觀樓舊有詩集姑蘓杜庠為之序庠詩云南浦北邊圓覺寺西山東面大觀樓乾坤上下不知極今古去來無盡頭斗酒江湖餘老興鳴鑾歌舞一浮漚史官楣扁題方了喜見先登二岳侯時周王二方伯過訪故結語及之慈雲菴在永和門内豫章城中無田惟慈雲庵傍平疇數畝殊有郊野之致兵後廢為荒隴𢎞緒詩城東華厦多朱門丹艧炫爛摇晨暾臂弓腰箭旃裘滿烈火蕩盡雲霞村蓬蒿影裏鴟吻出古屋還遮斑駁佛琉璃燈光半欲無黠䑕白書圍僧膝病樵輟斧聊一到恍記當年醉殘照清水三山幾變更老人謦咳如鴉聲生生庵在洪恩橋内有湖上亭崇禎間李少文司理嗣京建自為記華亭陳徴君繼儒為之䟦板蕩迄於梵天此亦招提之魯靈光矣有蜀僧住持頗久戊已江城之變目擊圍城中事每日午隂風黯淡健兒持鈎倚樓簷以伺見道上行人或數軰連臂而過輙舍去或孤行無侣則鈎取屠割人皆饑甚氣僅如絲屠割時不能號呼呀然一聲則肢體狼藉几上矣今孑遺落落晨星皆鈎取之餘肉也司牧者其幸多方而生全之西方庵在裏洲黎學使元寛重建沙塘庵在進賢門外大司馬熊公明遇建有記妙濟萬夀宫在廣潤門左故子城之南晋時建祀旌陽令許真君遜宫左有井與江水相消長中有鐵柱許旌陽所鑄西山雙嶺前亦有鐵柱一以鎮蛟螭之患唐咸通中額曰鐵柱觀宋大中祥符間賜名景徳觀政和八年改延真觀嘉定中御書額鐵柱延真之宫明壬寅初春髙帝至龍興過鐵柱觀嘉靖中賜今名萬厯二十八年燬復建前有勅書亭後有玉皇閣仙傳云真君諱遜字敬之南昌人生而頴悟博極羣書從呉猛得神仙秘法卜居西山下有售鐵燈檠者知為金而還之里人化焉太康元年任蜀旌陽令後以晋室將亂棄官而歸送而從之者如營壘今許家營是也南昌縣長亭鄉許仙村乃真君故居呉赤烏二年已未母夫人夢金鳯啣珠墜于掌中翫而吞之因而有娠正月二十八日辰時生真君勾曲山遠遊君邁䕶軍長史穆皆真君再從兄弟也至晋孝武帝寜康二年甲戍八月朔旦有雲仗忽自天而下二仙乗輦降庭宣玉皇詔曰上詔學仙童子許遜卿在多刼之前積修至道勤苦偹悉經緯愈深萬法千門罔不涉歴救災㧞難除害蕩妖功濟生靈名髙玉籍衆真推仰宜有甄昇可特授九州都仙太史髙明大使賜紫衫羽袍瓊旌寳節玉膏金冊各一合詔至奉行真君再拜登堦受詔一仙曰余乃玉真上公崔子文一仙曰余乃元真上卿段丘仲告真君以沖舉之期遂乗雲車而去是月望日大營齊㑹少長畢至日中遥聞音樂之聲祥雲四佈羽葢龍車從官兵衛仙童綵女前後導從二詔使復至又宣玉皇之詔乃揖真君昇龍駕命陳勲時荷持䇿前導周廣曽亨驂御黄仁覽與其父族侍從旴烈與其母部從仙者四十二口同時昇舉鷄犬亦隨飛騰留下修行鐘并一石函曰世變時遷即為陳迹聊以為記宋徽宗政和中降玉冊上尊號曰神功妙濟真君改觀為宫仍加萬夀二字真君慮後世奸雄妄作乃因鐵柱以為䜟記有鐵柱鎮洪州萬年永不休八索鈎地脉一泓通江流天下大亂此地無憂天下大旱此地薄收地勝人心善應不出奸謀若有奸謀者終須不到頭之句又預䜟云吾仙去後一千二百四十年間豫章之境五陵之内當有地仙八百人出其師出於豫章大揚吾教郡江心忽生沙洲掩過沙井者是其時也真君嘗言此地水陸衝要人物繁夥豈無分合得仙之人試以丹藥數粒雜他藥貨之令其信縁而取既而買者雖多竟無一人得遇真君吁嘆以世間仙才之難得也宋臨川王安石有重建許旌陽祠記明宋濓鎮蛟靈柱頌有序豫章郡鐵柱二旌陽令南昌許遜敬之鑄以鎮蛟者也郡地濵于江水蟲騁妖故民多江禍旌陽與西安呉猛世雲用正一斬邪三五飛步之術追殱其妖於長沙復懼遺孽洊興使工冶鐵柱壓其窟穴一在西山雙嶺南湮沒己久一在牙城南井迄今猶存柱出井外僅尺下施八索謂能鈎鎻地脉云唐咸通六年節度使嚴譔來為郡將發視之未及咫尺烈風雷雨江水暴溢譔恐而止其見于道家書者如此濓竊聞之周有壺涿氏秋官掌取水蟲若欲殺其神則以牡橭午貫象齒而沉之則其神死淵為陵神謂龍岡象之属是也古盖有其術矣矧单陽則飛制以重隂乃伏而不動鉄隂而蛟陽者也斯柱之建其亦沉橭象之遺意歟於戯豫章之民與蛟不兩立微旌陽西安民其魚矣濓不敏謹狥郡守葉君琛之請勒文柱下以頌神功於億萬載頌曰吳楚合城翼軫分經南昌鉅都蛟孽所庭咮攓波潏脽運濤縈夫諸獸驗胜遇禽徴沈竈鼃産􅝚阜泓成靈伯應厯鬼憲宣刑嶽籙三辰斗劍七星揮斥電戰刉割霆升河眚黒廓川液紅星軌妖設鎮冶金建楹祝融主𦦨閼伯司型八神錫羡五官儲精上旋圓樞下鍵方扄溟妃捧鑑淵后持衡飊笙鶴瀨月吹鳬汀仙旍廻紫童節流青𤣥勛潜湯素牒晶熒龜山鐵絙龍鼎文銘翊扶鴻宰幹運清寜泰山可礪靈柱弗傾明胡儼云豫章鐵柱厯代名賢多有題詠熊朋來詩曰九州失貢金司空不行水蛟龍弄波濤魑魅入城市吁嗟清談晋萬事漫不理遂令千載人稽首旌陽子正言反應詞簡意髙虞學士詩曰老龍無意弄新波化作鳬翁倚柱歌㸃石神方寜復得沉沙遺㦸不堪磨汾隂鼎鼐千年出海底珊瑚百尺過誰在蓬萊期刼外下騎黄鵠一摩娑此詩初出人皆未喻其㫖公曰此柱未敢必為旌陽之物故詩皆設疑詞以問之鐵柱詩雖多獨熊虞二公之詩超于衆作陸文裕公深云鐵柱宫之東南隅方丈甃池作石欄檻鐵柱在焉相傳為許旌陽治蛟之物甲午冬初余與同僚偶徃俯觀焉微露其端乃石耳非鐵也亦不作柱形豈厭勝所為與宋臨川謝逸鐵柱詩豫章城南老子宫堦前一柱立積鐵云是旌陽役萬鬼夜半舁來老蛟穴挿定三江不沸騰切勿摇撼坤軸裂蒼苔包裏鱗皴皮我欲摩娑肘屢掣旌陽挈家上天去只留千尺應門户西山髙處風露寒兹事恍惚從誰語安得猛士若朱亥袖徃横山驚北部廬陵劉辰翁詩海市蜃樓十萬家支祁從此罷騰拏偶留封植一柱觀慎勿飛揚博浪沙壯士釗身翻水赤都城弩手射潮邪要知此老神功妙大地千年一繫槎胡應麟曰許旌陽得道贈遠祖由王虚僕射曽祖琰太微兵衛大夫先祖玉太極把業籙籍典者父肅中嶽仙官賜所居宅曰仙曹左府右官皆天帝所令今人但知旌陽㧞宅事不知許仲武逃堯後復有此贈未審天上玉虚僕射較地下九州長何似耳真君與郭璞訪名山求善地為棲身之所得西山之陽逍遥山金氏宅遂徙居之今逍遥福地玉隆萬夀宫是也宋徽宗政和中感真君入夢授藥愈瘡詔洪州改修玉隆萬夀宫建炎中金人冦江右欲火宫庭俄而水自楹桷間出火不爇酋長大驚為記其事而去時天㑹八年正月初二日也傳顛名得一乃鐵柱宫道士徃來臨江之新淦踪跡莫測夜坐風雪中鼻息如雷人咸以顛目之淳熙元年召對徳夀殿賜號靈寳大師光堯贈以詩云有客東來欲試茶倦投松石坐欹斜暗香一陣連風起知有薔薇澗底花江文忠公萬里有御製詩䟦大畧言太上文奎寳箑賁於方外之臣矞雲絢采圓月騰輝則此詩盖光堯親書扇以賜之者一時宰臣史皓大參范成大儒臣朱熹皆有贈得之詩朱絶句云到處逢人説傅顛相看知是幾生前直把北斗傾銀漢去作龍宫第二仙史丞相詩不足觀遂不録左克明豫章道士也寓鐵柱宫所輯古樂府自三代至陳隋溯流窮源妙契作者之㫖太和劉冡宰崧有寄鐵柱宫左錬師詩紫霞樓上左仙翁不在南塘在玉隆虚閣飛鳬雲影外亂山騎虎月明中銅駝荆棘秋風落鐵柱波濤海氣通别後玉簫渾少聼令人長憶萬年宫宫中舊有鐵柱延真語録彚編道士熊常静所輯前後詩集大學士朱善為序常静師事左克明彚編盖左克明未竟之書而常静成之紫極宫在惠民門外晋建唐天寳書額内有呉綵鸞冩韻軒真仙通鑑曰呉綵鸞不知何許人或曰呉猛之女也唐太和末書生文簫客鍾陵西山其俗以中秋為許旌陽上昇日士女羣集㳺帷觀簫亦徃觀焉見一姝歌曰若能同步陟仙壇應許文簫嫁綵鸞自有綉繻并甲帳瑶䑓不怕雪霜寒生大驚異因伺之夜分姝與三四軰告别獨秉燭穿大松去徑盡陟山捫石冒險而昇焉生以潜躡其後燭將盡有仙童軰持松炬迎之生因失聲姝回首曰非文簫耶曰然姝笑曰吾與子數未合何太速生隨至山項有几案帷幄金爐異香侍衛甚嚴與生坐定有二仙娥各持簿書而前指江湖覆溺事生因徴其事姝不對生請益堅不得己乃告之曰此天機不合洩于子吾當為子得罪矣仙娥即去忽天地晦冥風霆震擊帷幄几案一時傾覆姝倉皇著衣秉簡叩齒肅容俯地待罪俄而風雲頓息星宿燦然有仙童自天而降持天判宣曰呉綵鸞以私欲而洩天機謫為民妻一紀遂與生夜携下山歸鍾陵舊處生貧不能自贍姝曰君具紙筆我為冩孫愐唐韻運筆如飛日得一部鬻之獲錢五緡盡又為之將十載人稍有知之者姝與文簫潜奔新呉縣藥王山側鄒舉村中一日題詩壁間别鄒舉云一班復一班隱入藥王山世數今逃盡烟蘿得再還簫聲凝露滴鶴翅接雲閒一粒主人藥服之能駐顔夫婦各跨一虎入藥王山而留仙丹一粒遺舉服之亦得却老今洪都城南紫極宫冩韻處為冩韻軒是也元虞伯生集冩韻軒記畧云隆興紫極宫寫韻軒髙據城表靣西山之勝俯瞰長江間乎民居官舍之中特為夐絶秋髙氣清望見上㳺諸郡山若臨江之玉筍撫州之太華寸碧天際森列户牖他處之所莫及也世傳呉鸞冩韻於此軒以之得名余昔在圖書之府及好事之家徃徃見其所寫唐韻凡三四本皆硬黄書之紙素方潔界畫精整結字遒麗神氣清明要皆人間之竒玩登斯軒而想其丰采亦足以寄遐思也乎虞集詩仙人本自好樓居偶下重簾冩韻書最愛夜寒天闕近碧牕留得玉蟾蜍宋洪朋詩紫極宫下春江横紫極宫中百尺亭水入芳洲界玉局雲映連山羅翠屏小楷四聲餘翰墨主人一粒盡仙靈文簫綵鸞不復返至今神宇夜㝠㝠劉㑹孟記畧云冩韻軒雖江山明麗而棟宇雕殘加以俗書滿壁類無不愧文呉二才子者後十六年余自廬山還過之則殿角如飛髙出廊右前欄俯月澄景内涵中分為三官之祀謂呉氏故司江湖水官附焉于是祀三官猶二仙云㑹孟又云凡呉氏唐韻皆反覆作葉子書朱墨分部精楷婉麗開玩如新近年猶有數本尚存世人不能效也緒按陸務觀云永康軍導江縣有迎祥寺藏唐女貞呉綵鸞書佛本行經計六十巻吾郡知有唐韻而不知有佛本行經雖博聞強識如伯生亦未曽及此清隱堂在紫極宫内元時道士余永和建永和數傳至𤣥谷道人余天熙創太古樓幽雅冠於郡城呉文正公澄過豫章輙造其地與聚談信宿不厭是時道士共七𣲖惟𤣥谷一𣲖最勝故其徒多有聞於士大夫間餘六𣲖則盡冺冺矣唐𤣥宗有親書紫極宫額載天下金石志宋徐鉉有紫極宫石鐘銘皆此地之佳話也文昌宫舊在城内明鍾翰王仲序詩云國祀元皇禮有餘紫雲古殿近清虚文光上接三台位星象中分六府居喜有神仙司桂籍諒無名字灑瓊書今來亦欲從君去白鷺沙洲共釣魚宫已久廢僅此詩存耳萬厯間中貴潘相重建宫於磨子巷丹楹雕題頗稱秀麗玉清觀在進賢門外水次倉口宋慶元二年九江道士黄自然來此有道術善療疾疫京丞相鏜捨園為立觀祀𤣥帝建徳觀在易俗坊晋咸和間建相傳南嶽紫虚元君魏華存修真處觀後塘内有魏夫人丹井井上有亭亭舊藏玉皇天尊各像皆金銅物僧道義復建月濤庵於側文士每盤桓而偃息僧亦延欵不倦也妙濟觀在蓼洲元至正二年建觀右有許真君咒劍丹井觀音閣在進賢門外𢎞緒詩琉璃燈影在人世幾滄桑草樹天無際江山鳥獨忙僧閒龍隱鉢寺古鴿棲梁記得停船日風吹茉莉香玉虚觀在徳勝門外祀𤣥天上帝元至正壬辰年兵燬道士載真空重剏永樂中學士曽棨有記純陽觀在進賢門外陳仲舉祠左宋建崇禎間重修明熊公明遇詩東臯朝日近迤北白雲天犬吠仙源裏鶯啼道院邊石壇苔色古松塢月華鮮聞道純陽子曽經此探𤣥新關聖帝君廟在大成坊右最稱雄偉後為閣以奉觀音大士廟外左右坊額曰仁至義盡𢎞緒有特建碑記漢前將軍假節鉞督荆州事漢夀亭侯姓關氏諱某字雲長小字長夀河東解梁人漢靈帝中平元年帝君奔涿郡依先主率校尉鄒靖討黄巾賊獻帝初平元年隨先主討董卓建安元年隨先主拒袁術五年封漢夀亭侯十二年先主奔江南帝君綂舟師屯于樊口先主與孫權將周瑜共拒曹操於赤壁破之帝君隨先主追操至南郡十四年先主領荆州牧以帝君為盪冦將軍襄陽太守十六年先主入益州帝君與諸葛亮張飛趙雲等鎮荆州十九年先主以帝君督荆州事召諸葛亮等引軍㑹成都是時先主領益州牧二十年帝君在荆州與孫權將魯肅相拒二十四年七月先主稱漢中王以帝君為前將軍假節鉞八月出師圍曹操將曹仁于樊又遣别將圍吕常於襄陽十月曹操使其將徐晃救樊孫權使其將吕䝉襲江陵十一月引兵南還保麥城十二月被害卒於漢鄉漢後主景耀二年追謚忠義侯宋徽宗崇寜元年追封忠恵公四年加封崇寜真君大觀二年加封武安王宣和五年加封義勇武安王髙宗建炎二年加封忠義義勇王淳熙十四年加封英濟王明成化十七年封崇寜義勇武安王萬厯十年封協天大帝四十三年加封三界伏魔大帝神威遠鎮天尊關聖帝君帝君常云日在天之上普照萬方心在人之中以表丹誠又云願天帝生好人願人常行好事大哉言乎當與六經相表裏矣月城關聖廟在北門月城内承平時郡人皆於此中祈禱歲無虚日𢎞緒謁關聖廟詩中天懸赤日亘古照丹心漢鼎因増重明封孰敢侵鐵衣三界望汗馬百魔欽蘋藻尋常供公前倍覺馨不負長髯曵千秋孔與君華夷名遍震義勇鼎三分魚鼓傳耆老鯨鐘響夕曛遥知禪悟處刀影冷層雲𤨏屑呉仇事髙懐芥蔕空偏安虚壯畧䕶國凛英風婦孺魂頻懾牲醪久愈崇肅然瞻拜處仙佛仗神功城西北關聖廟在撫院公署傍廵撫兵部侍郎兼都御史蔡公士英建學使黎元寛有碑記文甚竒崛刻廟中蓼洲關聖廟按吾郡祀帝君於郭外新城門外濵江廟為最古蓼洲則鹺商所建廣潤門外則居民所建然以地狹俱不免湫隘未若郭内之巍峩也帝君籖有東坡解碧仙註而占驗僅存一二條殊為缺漏鄙意以郭外諸廟為舟車叢集之地廟各置簿題曰占驗増補令徃來人各以其所見所聞之靈異者備書之每數歳延文士潤色附入占驗之下亦闡揚之快舉也他處俱可以此推行之馬王廟在順化門内前祀馬王之神後祀關聖考周禮馬祖為房星其所祭先牧則始養馬者俱未嘗以王稱此稱為王者或曰馬鳴王或曰釋迦之馬鳴大士或曰道家之馬師皇俱不可考始仍其舊稱以告䖍焉可也𢎞緒有重修募疏江東廟在廣潤門内神姓石名固秦丗贑人漢灌嬰擊南越神降絶頂峯告以克㨗之期已而功成因祠祀之宋隆祐太后駐蹕於贑金人深入至皂口彷彿見神擁隂兵䕶衛前後靈應甚衆備載贑州江東廟宋濓記呉楊溥時封神為昭靈王宋封至崇惠顯慶昭烈忠祐王元三易封為䕶國普仁崇惠靈應昭烈忠祐王紹興志云江東廟在城東北三里神姓石名固秦世贑人廟食於贑江之東漢陳嬰討南越神以㨗聞此廟起之始按此則擊南越者乃陳嬰非灌嬰也大梁趙與時賔退録亦云江西郡縣城隍人多指為灌嬰其實不然友人蕭大年攷功臣侯表始知為陳嬰盖嬰自定東陽為楚將項羽死属漢定豫章浙江封棠邑侯都浙流俗所傳不為全無所據但誤其姓耳與時之言與紹興志脗合存之以備參攷文孝廟在章江門外祀梁昭明太子蕭綂昭明既薨長子歡應嗣位武帝捨嫡孫而立其第三子晉安王綱是為簡文帝止封歡豫章郡王後薨於江州謚曰安及簡文見廢侯景矯詔奉歡子棟即帝位棟方與妃張氏鋤葵而法駕奄至驚不知所為泣而升輦未幾改號天正加昭明太子為昭明皇帝安王為安皇帝或曰後梁岳陽王詧稱帝江陵時所上尊號詧盖昭明帝三子也臣於魏魏屯兵江陵守之𫝊巋琮二主至陳後主禎明元年為隋所滅盧志不知天正改元己有追尊昭明之事輙謂詧歸魏自立始尊綂為皇帝豈未讀南北史耶江右南康與金陵俱有廟祀昭明其題額曰文孝昭明字徳施小字維摩武帝之長子也生而聰睿三歲受孝經論語五歲遍讀五經悉通諷誦性仁孝自出宫恒思戀不樂帝知之每五日一朝多便留永福省或三日五日乃還宫其母丁貴嬪有疾昭明朝夕侍左右衣不解帶及薨步從䘮還宫至殯水漿不入口每哭輙痛絶武帝勅中書舍人顧協宣㫖曰毁不滅身聖人之制痛不勝䘮比于不孝有我在那得自毁如此可即強進飲粥昭明雖奉詔勸偪終䘮日止一㿻不嘗菜果之味體素壯腰帶十圍至是減削過半每入朝士庻見者無不下泣所著文集二十巻又撰古今典誥文言為正序十巻五言詩之善者為英華集二十巻文選三十巻按後梁稱帝江陵中宗詧享國七年世宗巋二十三年莒公琮一年臲卼於周齊分據陳隋擾攘之秋竟能保有蕞爾至三十餘年不可謂非昭明之徳澤也王仲淹帝魏頗為縫掖所譏若以詧繼湘東至開皇七年梁亡始大書隋髙祖年號而以綂属之於南或亦筆削之一義與棟為武帝嫡孫其嗣位甚正但屬侯景推戴遂不克令終然進帝昭明實出自於棟耳黄司空廟祀陳司空黄法氍萬厯間太守范淶重修府同知黄在裘記法氍字仲昭新建人少勁健有胆力步行日三百里距躍三丈梁侯景之亂於鄉里合徒衆太守賀翊下江州法氍監知郡事陳武帝討侯景令周文育屯於西昌法氍遣兵助文育屯新淦縣侯景黨於安慶分兵來襲新淦與戰却之進克笙屯俘獲甚衆敬帝即位封新建縣侯割江西四郡置髙州以法氍為髙州刺史鎮巴山廣州刺史蕭勃遣歐陽頠來攻法氍拒戰頠敗走及武帝踐阼入陳以破王琳擒余孝頃功授平南將軍開府儀同三司又與周廸共平熊曇朗功最大天嘉中周廸反率兵㑹都督呉明徹討廸於上塘誅之明徹拜都督江吳二州諸軍事鎮南大將軍江州刺史廢帝時大舉北伐以法氍為都督出厯陽齊遣將來援禦于大峴破齊軍盡獲人馬器械遂克厯陽進攻合肥降之加侍中改封義陽郡公累遷都督以功大故祀之孚應廟額佳山福地在修仁坊相傳唐隱士崔姓自汾寜逰至此值城中患疫隱士以丹擲井折柳示人汲飲病者即愈井在今清平坊之上街所著有入藥鏡一篇載道書勅封佳山孚應侯廟久廢萬厯間迭建額曰佳山福地或云神晉人崔姓子玉其名唐憲宗得竒疾諸醫不效忽有道人賣藥於市一粒而愈問其姓名曰臣豫章人崔姓俄不知所徃遣使覔之乃於此地得崔公祠詔封英烈侯與前所載不同並存之黄谷𤨏談云永青山有大王廟廟額云西齊䕶國王人不知何神也攷東嶽懴曰岱嶽顯聖威靈䕶國西齊王崔府君則固嶽神位下第一䕶法也府君名子玉隋大業三年六月六日生唐貞觀時為鼓城令據此則神乃貞觀時人與典午氏無涉吾土或亦以東嶽輔佐之故而祀之耳廟内舊有古槐載范淶志藥王廟在文昌宫右火神廟在磨子巷祀熒惑星君萬厯間建白馬廟在府學左祀際真䕶法白馬忠懿侯王神産分寜兄弟三人從許旌陽斬蛟二兄己被害忠懿奮勇而徃卒擊殺蛟豫章為立廟祀之三聖廟在廣潤門外祀白馬神兄弟頃乙未歲四月初三日夜半烈風雷雨廟祝見怪自江中來目光如炬水湧起丈餘漸近石堤祝急鳴鐘籲神廟中隱隱作叱咤聲怪遂奔回揚子洲石堤頼以無損陳司徒廟在進賢門外徐孺子墓傍去祠濵江之南二十里有髙風廟亦祀司徒陳蕃字仲舉先為青州樂安太守郡人周璆髙潔之士也前後太守召俱莫肯至惟仲舉能致之字而不名特設一榻去則懸之後左遷豫章復以此施之南州髙士徐穉仲舉所虚心折節惟此两人至大將軍梁冀威震人主遺書詣蕃有所請託輙不得通使者詐求謁遂笞殺之其加禮韋布而不畏彊禦如此稱為天下義府豈徒然哉范史載周璆事於仲舉傳而豫章設榻則載於徐孺子傳中讀者徃徃失於參攷遂専以属之孺子耳温忠武公廟在進賢門外居江之濵祀晉江州刺史温嶠南昌胡儼有記俗誤以為祀司馬温公遂稱司馬廟至今未正其訛唐忠烈祠在章江門外祀顔常山魯公兄弟俗稱大王廟相傳魯公為監察御史辨寃獄於五原遂致甘霖故建祠以禱水旱兼嘗歴饒州刺史吉州司馬此亦其過化之地也祀常山當以袁履謙配祀魯公當以李蕚配海内祀三顔者須以吾言告之魯公貶吉州司馬時日與詩人文士倡酧為樂世傳有廬陵集十巻章江廟一名沛澤廟在新城門外祀郡人漢章文以其獻地築城佐灌將軍而有功于吾土也宋大觀中祈禱甚靈賜額沛澤廟廟傍隙地數武僧幻修建凖提閣萬時華為作募疏澹䑓祠在府學前大成坊萬厯中廵撫都御史四明王公佐特建以祀澹䑓先生郡大夫士講學肄業其間每有地方公務亦於此祠商酌月有講㑹有文㑹公議移豫章舘諸鄉紳所貯金買田以濟㑹費因置伍諫鄉安豐莊田五百二十四畝每歲管祠郡大夫士輪掌無與在位事天啟末逆閹魏忠賢斥賣郡國書院助水衡錢此祠亦在賣中業已有售之者至曵澹䑓先生像投于江濵崇禎初烈皇登極首殛大璫特㫖復諸祠太守彭期生奉澹䑓主以歸諸廢悉皆振舉甲申後講席忽化為廐舍廵撫兵部侍郎兼都御史蔡公士英見而嗟呀盡驅後垣之鳩居者遂傾囊金召匠作葺舊祠而新之同藩臬諸公延請郡大夫黎元寛暨陳𢎞緒課士其中復設處百金買田一百畝以佐膏火廵撫兵部尚書張公朝璘復捐囊重修懸示以止使車假寓甚力歲戊戍黎與弘緒懇辭祠務至再至三遂以田盡歸南昌府儒學詳具黎澹臺祠紀畧中大司馬熊明遇少宰熊文舉並有祠記督學楊兆魯有澹臺祠欵約祠舊有塑像塑工以意為之按李龍眠畵七十二子像滅明猛毅甚于子路夫子所謂失之子羽者謂其貎武而行儒耳同仁祠在洪恩橋祀明都御史孫燧副使胡世寜許逵都御史王守仁知府伍文定御史唐龍凡六人皆正徳已夘宸濠之變前後殉難及戡亂之諸臣也萬厯間知府范淶重葺知府盧廷選再修之新建丁此吕撰祠記褒徳祠在南浦驛南香巷祀廵撫江西都御史夏公良心萬厯二十九年建有特賜祭田陸公祠在徳勝門外水晶坊祀廵撫江西都御史陸公萬垓萬厯間建祭田二十六畝七分餘大學士張公位撰祠記江城名蹟巻三
