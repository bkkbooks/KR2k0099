body:
  text: 江城名蹟地理類七古蹟之屬提要臣等謹案江城名蹟四巻國朝陳宏緒撰宏緒字士業新建人明末以薦授晉州知州時劉宇亮以閣臣督師欲移兵入晉州宏緒扼不納坐謫為湖州府經厯鼎革後終于家是書以江西省㑹為南昌新建二縣地因攷其名蹟以城之内外為限凡去城逺者則不及多詳于樓觀祠宇梵刹園亭之類巻上為攷古巻下為證今自序謂古與今不以時代為斷而一以興廢存亡為斷葢事皆目厯非徒按籍而發也宏緒文章淹雅在明末號能復古故作是書序次頗有條理考證亦多精核惟喜載雜事多近小説且多曼衍旁渉如天寧寺條下載寺僧淫䙝之類頗乖大雅亦非地志之體是則體例未嚴不免為白璧之瑕矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀江城名蹟自序名蹟記記江城内外之名跡也城之為門者十有二今僅存其七其四𨽻南邑其三𨽻新邑新邑濵章江渡江而西則漸遠於城矣南邑地皆平野帶郭之闤闠頗盛民居盡而阡陌林莽出則又漸遠於城矣遠於城者槩不記記固以城之内外為限也吾郡之名蹟夥矣而僅以城内外限者何也城内外吾之所日涉而遠於城者非吾所日涉也非吾所日涉者猶吾父母之邦之名跡也而顧可略之乎緩急之異也吾日接四方賔客問我以遠於城之名蹟而吾茫然孰與夫問我以城内外而吾茫然者之可耻也故曰緩急之異也且夫城内外名蹟非獨吾日涉之亦四方賔客之所日涉也其問我也必先乎城内外而後徐及乎遠於城者其徐及之吾亦可以徐及之也析為上下二巻者何也兹則古今之異也薛道衡之所豔王勃之所稱杜牧之之所揚詡倐忽而歸於灰飛烟滅薛與王與杜之所未及見而待吾軰為之薛與王與杜者亦倐忽強半而歸於灰飛烟滅其不能遽議汶陽之復者於是題之曰攷古其幸而尚在與新搆者於是題之曰證今古與今不以時代為斷而一以興廢存亡為斷焉此上下巻之所由析也嗚呼吾愧非道衡也愧非勃也牧也然而百年有盡之軀則有時而古矣古則人恕而存之恕而存之又安問其為道衡為勃為牧哉而又安問其不恕者哉石莊居士陳宏緒題
