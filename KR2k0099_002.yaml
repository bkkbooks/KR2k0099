body:
  text: 江城名蹟巻二新建陳宏緒撰攷古二鳥遮塔俗訛為烏遮塔在望雲門外天王院舊傳隋仁壽中分布舍利於五十州建置寶塔此其一也初到院日有大頭鳥前道故名罹建炎兵盜塔毁基存其徒僅立屋數椽以居莫能復舊觀淳熙七年杭人喻紳來為府鈐轄妻徐氏夢異僧引詣廢寺有故塔遺址羣鳥聚焉徐氏素崇禮西方覺以語紳使訪測厥祥或以天王院告因過之儼然夢境乃盡捐囊中所藏以造寺寺既久廢多為人蔇菆其間紳白府帥悉起之凡十數塚其一有小石碑高不盈尺廣半之細視則陶埴所作範其上為蓮葉下為荷傍為花中有真書文曰神武聖文皇帝之廟兩傍夾書曰貞元二十一年紳觀之而懼但留石碑復掩其竁而高築其處按貞元乃唐徳宗紀年以二十一年正月終十月葬於崇陵其生時稱聖神文武沒諡神武孝文此四字雖略同然本葬長安又碑在地中而印文曰廟不可曉也彭真觀在舊新建縣西即宗華觀相傳彭真君伉故宅晉義熙十年名觀曰宗華謝康樂書額内有彭真君丹井舊刻南唐隐士許堅詩久不存彭伉字武陽蘭陵人仕晉為尚書左丞密修仙術師事許真君納女為其子婦後辭官移居豫章再詣真君門下盡傳其道宋永初中闔門二十六口白日飛昇靈應觀在通仙坊不知造於何代今己丘墟五嶽觀在進賢門内東營巷唐長慶二年建𤣥妙觀在廣潤門内唐天師胡慧超過此見大樟樹為妖焚其樹創觀以鎮之初名信果觀唐末江南有道士厲歸真者曾遊觀内見三官殿功徳塑像有明皇詔以夾紵製作甚妙然主者不甚嚴䕶多被鴿糞汚穢歸真遂于殿壁畫一鷂筆跡奇絶自此雀鴿無復栖止凝真觀元時清溪徐道士所創在徐孺子蘓雲卿二祠之右南陽納新有挽徐君詩云豫章湖上列仙居曾借仙人夜讀書碧乳分茶烹雪水青精煮飯薦冰蔬攜尊屢醉雲卿圃著屐同過孺子廬夢斷人間如轉燭悲歌千里送靈車龍興觀在徳勝門外唐神龍間賜額舊有假山高數丈可以登陟按吾郡假山之奇者建安府園此樂園校士公署園李宗伯閬園徐念孺世清園皆玲瓏聳秀出自天成今鍛鍊於昆明之刼摧折殆盡可嘆也宋知洪州程師孟詩誰將怪石叠危巒移得仙家小洞天烏鵲過時無玉抵黄花散處有金鈿茶烟早晚成雲霧松雨高低作澗泉莫道此山都是假世間萬事盡皆然開元觀在修仁坊舊有天師萬振徳業碑唐滕王元嬰撰振字長生南昌人隐現齊梁間人莫知其年嘗以符咒己人祟疾隋文帝賜號天師詔於洪崕山為館以居之唐時漁者得青石長七尺扣之有聲郡以獻于朝命碎之得二劍鐔上刻振姓名高宗嘆異召見於曜日殿處之如師友龍朔初尸解去已殯數日啓棺惟一劍一杖存詔以銅函盛劍杖葬于西山天寶洞之側道徳觀宋建以祀老君觀基後入貢院改建東湖之北今廢太乙觀在城東本梅子真宅唐貞觀十五年刺史周遜奏建以居天師萬振一名天寜觀清真觀在徳勝門外今廢甘棠廟在東湖南祀周時召公奭知縣何遷重修賈萌廟在新建縣治北按舊志云賈萌漢河東人仕為郡守與安成侯張普約同起兵誅王莽普負約遂獨戰死即日顯靈於津渚因為立祠其主簿嚴豐亦臨難抗節配享祠中武烈廟在高士坊神陳杲仁字世威晉陵人陳時為江西巡察大使有賑荒之惠入隋拜司徒唐武徳中卒豫章人立廟祀之唐封為忠烈公南唐時以神兵助戰册加武烈帝徐鉉有記睡仙樓亦名睡仙觀在府治西南大魚巷宋時為酒庫紹興間有一人幅巾野服横壁睡卧於此衆聚觀之其人徐起以袖障面趨出遂失所之後人因建樓肖像以祀郡人王仲序詩樓觀依城北真仙睡起遲雲深虹影靜月落樹陰移鶴唳原無警猿啼亦未知陳摶如見問不减華山時明劉冢宰崧贈睡仙觀魏煉師并柬黎鐵峰仙者云我忽不樂思西山浮雲孤飛道里艱睡仙之宫隔秋水縹渺半落青霞間何年流火如隕石鬱攸煽天斗牛赤朱鬛蒼龍天上飛金甲神人露中泣當時煉師事逺遊噀酒不到西江頭歸來三日哭灰燼𤣥猿弔月寒啾啾復獨乘雲翳鸞鳯贑水南邊謁林洞千章喬朩閟烟霧逝此伐之作梁棟空山留滯今幾年斷礎荒甓凄寒烟堂中老仙髮如雪吹笛日望南歸船南平監州最惜别手挽瓊珂弄明月誓將緑簡授𤣥秘恨不攜之覲瑶闕鐵柱仙人鐵峯老鬚眉飄蕭顔色好一徑清風掃落花千巖碧霧畊瑶草昔曾暫宿清隐宫石爐夜看燒丹紅煩君乞與換骨藥明當跨鶴長相從按槎翁此詩睡仙觀燬於元末而魏煉師採朩於䖍以謀復之但未知果酬此願否耳金波樓宋末逸民熊與和建與和字天樂新建人性介澹無妻不食肉獨喜飲酒洪州酒之佳者曰雙泉曰金波用以名樓志其所嗜也與和通經史百家之書布衣草履遨遊諸名山挾琴就松風彈之竟日忘返工草書酷類張顛詩尤有奇崛氣臨江杜本清碧選入谷音集中物華樓在府城南洗馬池宋治平間知洪州程師孟建臨川王安石寄程詩云千里名城楚上游江山多在物華樓遥知玉節臨樽爼獨卧柴門隔獻酬想有新詩傳素壁怪無餘墨到滄洲偶陪南望重重緑章水還能向北流杏花樓在東湖傍相國張文端公位别業長隄蜿蟺垂柳毿毿覆之樓孤峙於水中央四面蒼波翠影環抱寂無左右隣居萬厯末予與彥會十一人結社其處積翠樓在章江門外王仲序詩高樓峙江氾突兀起空碧戸牖近星辰樓甍麗雲日開軒面洪崖逺黛翠如積日落秋江明遥空同一色緑雪樓明大司馬熊良孺先生明遇建先生居諫垣時讀書其中多所著述碣石舒公稱其前後諸草合新都之浩瀚北郡濟南之高古呉下之宏雋併為一人傳者信為實錄先生為予父執居更密邇然未嘗持鄙文求正偶見代某老作邑侯詩序忽語予曰某老不能有此當是君為之捉刀耳予笑而不敢自匿後見予友呉次尾應箕文序問此何人頓挫酷類子長而議論骯髒當是鬚眉男子予為言次尾生平甚悉今次尾一死己不愧文陸先生亦自閒關蓬轉埋骨首陽久矣悲夫公子伯甘銓部與予少同筆硯所著熊山詩泠然漢魏之遺響也褒賢閣在東湖傍宋樞呉君厚建於私第以藏賜書徽宗親書褒賢之閣四字以寵之今廢臨湖閣在東湖傍宋向巨源建乾道中巨源構北閣以書求記於洪景盧邁景盧為作記甚奇文多不録巨源書筆於此自某卜居南昌擅東湖之陽人行湖邊頫大明鏡荷花十里炤景徹日晨霏夕靄開闔而摩盪屬玉交青浮游而後先西山横長蜿蟺旁薄空翠長烟舒慘異狀常若洪崖浮丘翁挹袂拍肩其間凡湖山賦我以佳賞撩我以環觀謂不能俯而有也今吾臨之以傑閣崇而為丈者四去一以為從益一以為横既成而日登焉湖之所以為湖山之所以為山次且自失不能嘉遯相與收精會神爼豆於吾軒楹之間東則十畝之園池臺竹樹輸幽呈茂有章堂在湖堤北其北與西折旋皆山淡然如修眉横逺可玩而不可狎物色位置大略似輞川臨湖亭故即而名之吾猶夷其上非更衣就枕不釋也列岫亭在府城北龍沙前對西山取謝朓牕中列逺岫之句朱晦翁過吾郡每徘徊於此謂列岫望西山最正殆無毫髮遺憾滕王秋屏皆不及也作絶句二首城中望西山拄頰空朝暮不到列岫亭詎知親切處東西水平分南北山中判妙處毫髮間商畧無遺算又晚飲列岫七言絶句危亭披豁對蒼霞䇿杖重來日未斜滿目江山一樽酒哦詩莫遣大雄誇滕王閣二亭閣初建時夾以二亭南曰壓江北曰拱秀宋末二亭並廢吏隐亭在府城東湖内新建縣學西南祀梅子真與南昌縣學東南徐孺子亭對峙萬厯三十五年知府盧廷選創建有題句云疏草孤忠扶赤漢湖雲千載擁丹經又梅仙亭在進賢門外亦祀子真元末巳廢於兵燹矣豫章溝亭在府城故望雲堤上宋嘉祐中知洪州程師孟建宋楊傑詩溝環故道穿城角沙漲平江壓水涯江外西山啣落日幾重蒼翠襯殘霞明胡鼎詩桃花浪暖拍天飛湖漲溟濛岸亦移避水人家城上嘆舊溝重鑿待何時望江亭在府城東湖之西臨城上唐觀察使韋丹建今廢韋公遺蹟僅傳此亭選勝地以存故名庶因遊觀而寄蔽芾之思耳會城雉堞頗低東湖沿城一帶皆可以眺望江山棄平而取之於高則以樓閣為宜且可以逺濕蒸之患也臨章亭在南浦亭之東唐崔輔國詩楊柳映春江江南轉佳麗呉門緑波裏越國青山際遊宦常往來津亭暫臨憩驛前蒼石沒浦外湖沙細向晚宴且畢孤舟悠然逝雲留西北客氣歇東南帝獨有凄凄心誰知怨芳歲舊龍沙亭在府城北龍沙岡唐時有之乃洪州熊秀才之清風亭也觀察判官權徳輿與客讌集於此賦詩徳輿為之序今己久廢龍沙亭在龍光寺之南其前為聽松寺萬厯中布政使呉獻台陸長庚創立學使錢檟有記參政張恒詩閒亭新卜築晏坐覺心閒靜似維摩室香侵般若臺沙雲秋淡蕩水月夜徘徊好結青蓮社公餘遞舉杯右布政使丁繼嗣詩頻攜勝地有餘清物外翛然不世情沙白水明龍作穴天空人靜鷲為京芙蕖挹露浮香玉薜茘團星㸃化城握麈步移松下聽風聲猶詫是經聲羡魚亭宋吏部尚書徐忠愍公禧建于東湖上山谷詩有紫髯將軍不復見空餘叢桂緑婆娑之句盖徳占既狥當時之難山谷過其地而追憶之耳豫章臺一稱龍沙臺在府北江水之濱白沙湧起堆阜蜿蜒如龍舊俗為重九登高處臺側有碑刻宋蔡九峯詩明初駕至南昌登兹臺集父老諭之曰陳氏據此軍旅百需民甚苦之今俱不以相勞其各事本業為吾良民父老皆感悅忭舞宋况志寜詩城陰零落豫章臺平地晴沙捲雪來欲訪隣翁問塵跡小園芳徑長莓苔明王中翰仲序詩城西千古豫章臺遺址荒凉翳草萊出地尚疑根錯落翻風猶憶影崔嵬江澄月滿龍初蟄朩落霜飛鴈正來念子攜家歸舊隐青原山下詠寒梅風月臺在郡子城上本江月臺宋陳之茂改名舊有碑記水操臺在徳勝門外龍沙之北崇禎間巡撫都御史解公學龍建每歲秋月練兵於此臺後有止戈泉清冽為郡城諸水之冠宏緒詩閱武臺空更此臺曾聽孤角曉雲開長江冷落鵜鶘影不見中丞豸繡來梅君堂寰宇記曰梅福宅一名梅君堂在縣東北三里西接開元觀有東西墨池及書堂後漢徐穉少有高行追美梅福之風乃於福宅東築室以居古梅仙祠在尉㕔祀漢壽春梅子真有蓮花池故址相傳子真所創按陳繼儒香案牘云墨池在南昌縣水竹幽蔚王右軍典臨川郡日每過此盤礴不能去因號墨池先是梅福種蓮池中嘆曰生為我酷死為我梏形為我辱妻為我毒遂棄妻入洪崖是則墨池之名起於右軍梅子真種蓮其中但可名之蓮花池爾前漢梅福傳福棄妻子去九江至今傳以為仙人有見福于會稽者變姓名為呉市門卒或云呉門乃今洪州之呉城鎮去九江亦不逺矣豫章職方乘云梅嶺在西山極崇峻羊腸而上五里至頂山下有梅仙觀今號陽靈觀觀之上有梅仙壇舊說梅子真棄南昌尉學道于此唐羅隐作梅先生碑記猶存宋黄庭堅梅仙宅詩呉門不作南昌尉上疏歸來朝市空笑拂巖花問塵土故人子是國師公宋高宗紹興二年閏四月己未封漢南昌尉梅福為吏隐真人見通鑑長編此洗堂在東湖之濱明章斗津先生潢建每月集諸友人羣弟子於堂中講習開發指湖南謂衆友曰今南昌人品動稱徐孺子豈孺子後南昌遂空無人耶今構此堂南峙徐亭庶幾成人勿使笑卑薄之域于千載耳先生慨正學之日漓悲心源之日汨以通天地人曰儒自命爰自古太極圖河洛圖與夫天道地道人道之全皆分類纂集名曰圖書編凡三百二十七巻又作易象義詩原體書原始春秋測義禮記劄言各若干巻直指呉安節公用胡敬齋列疏薦于朝少宰正庵楊公時喬奏授順天訓導萬厯丙午主江省試者以先生與呉康齋鄧潛谷劉瀘霄四君子徴辟事發䇿諸生語詳録中督學蘓弼垣公率賓興江右士謁先生豫章書院而受學焉七十餘乃卒雙泉堂在薦福寺内其地有淺沙泉馬跑泉水品為㑹城第一宋程公闢作雙泉堂潘興嗣為記傍有清源真人祠所謂灌口二郎也事見周益公文集蘓翁圃在百花洲俗名三洲蘓圃翁蜀之廣漢人逸其名字曰雲卿與宋丞相張浚友善遯跡豫章以種蔬織履為業德逺常函金幣貽書洪帥及漕曰故人蘇雲卿今之管樂流也幸為我造廬禮致之帥與漕使更服造請雲卿揖坐松根因泛問徳逺識量雲卿曰長於知君子短於知小人時南宫黍離徳逺志在恢復因又問曰張公能了此否雲卿曰恐未能了得二公徐拱立出書幣雲卿神色不怡喉間隐隐有聲似怨張暴己者二公請與同載謝曰來日專當修敬翊日遣使至雲卿己遯去矣宋劉子翬有蘓雲卿傳宏緒詩滄桑又見古城中此地還隨廣漢翁始識剪桐真是戲荷鋤閒撥菜根蟲唐觀察使路嗣恭宅在府城北徳勝門外後為王虚觀唐柳渾佐江西幕嗜酒好入㕓市不事拘檢時路嗣恭初平五嶺元載奏言嗣恭多取南人金寶是欲為亂陛下不信試召之必不入朝三伏中遣詔使至嗣恭不慮請待秋凉以修覲禮渾入而泣曰公有大功方暑而召是為執政所中今少遷延必族滅矣嗣恭懼曰為之奈何渾曰健步追還表緘公今日過江宿石頭驛乃可嗣恭從之代宗謂載曰嗣恭不俟駕行矣載無以對事見唐國史補唐來鵬宅在東湖傍鵬有寒食山館書情云獨把一杯山館中每經時節恨飄蓬侵階草色連朝雨滿地梨花昨夜風蜀魄啼來春寂寞楚魂吟後月朦朧分明記得還家夢徐孺宅前湖水東鵬詩思清麗弟鵠師韓柳為文大中咸通間兄弟聲名藉甚南唐中書令宋齊丘宅在府城東齊丘兩為洪州節度使所居舊里愛親坊改為錦衣坊大啓第宅窮奢極壯居坊中人皆使修飾牆屋門巷備極華潔民不堪命相率逃去坊中為之一空齊丘初赴鎮烈祖曰衣錦晝行古人所貴賜以錦袍親為著之因遂名其坊曰錦衣元宗時以罪歸青陽齊丘曩曾結廬九華山即舊第之外别院處之重門外鎻穴牆以給食明年自縊死諡醜繆如此人廼竊譚景峭之書以行世然其早歲嘗作鳯凰臺詩亦自楚楚風雲月露之詞固不足道也鄭文寶江表志云徐公撰江南録議者謂之不直盖不罪宋國老也又云國老當淮甸失律之後接引門人陳覺李徴古掌樞密之任且授其意曰天命已去元宗當深居後苑請國老攝國事令陳喬草勅喬力諍之而止舉國皆聞為臣之道如是餘可知矣齊丘宅後捨為中宫寺南唐節度使林仁肇宅在府城東仁肇建陽人剛毅有膂力姿質偉岸文身為虎兒因謂之林虎兒周世宗征淮甸江南割地退師仁肇方為潤州節度使密說後主曰中原承衰亂之後前年征蜀今取交廣往還數千里兵己罷弊請假臣兵數萬北渡直抵壽春分據正陽因其思奮之民累年之粟覆取淮甸勢如轉丸仍乞臣起兵之日聞於北朝言臣據兵竊叛事成歸國否則請族臣家以明陛下之無貳後主驚曰汝無妄言宗社危矣乾徳三年以仁肇為洪州節度使留守南都與皇甫繼勲輩不協因構仁肇求援於宋欲自王江西後主潛使人鴆之陳喬聞仁肇死嘆曰事勢如此而殺忠臣吾不知其死所矣按城東宅當是仁肇留守時所剙今己迷不知處唐平南王鍾傅宅在府城崇梵坊今為永寜寺宅傍有娉婷市陸友仁曰洪州娉婷市五代鍾傅侍兒所居後以名市畢少董謂可對溫柔鄉胡鼎詩云訪寺行吟日未西荒園故址草離離老僧對客無多語只說南平冨貴時鍾傅高安人唐末乘王仙芝之亂擁衆據洪州逐觀察使高茂卿即拜為洪州刺史僖宗時加鎮南軍節度使封潁川王俄徙南平自廣明亂後州郡不貢士惟傅歲辟薦行鄉飲酒禮率賓佐臨視後大會以餞之資以裝賫解元三十萬解副二十萬其餘皆不減十萬故士皆不逺千里來赴據江西幾三十年卒子匡時自立為節度使淮南楊渥將秦裴攻陷洪州執匡時去地遂為淮南所并廬陵永福鄉陽臺有南平王祠宋熙寜間風雷忽作祠自徙平陂廟傍有夢閣凡舉子來占夢往往奇驗陳晉公宅按豫章職方乘三司使陳晉公恕建第東湖上今迷不知其處晉公有子五人其一人為宰相恭公次為北部君最少為司農卿良器皆以任子起家文章政事輝映當時恭公相業備載仁宗御製文而北部與司農卿俱王介甫為之碑誌叙次遒逸可誦北部葬江陰司農卿葬祥符俱弗獲遂首丘之願吾郡未有能傳其軼事者北部嘗上書自言疾病且死無田園以歸而介甫亦言司農卿家無田園僅僦官屋棲身以宰執之子宰相之介弟又躬歴膴仕而亷潔至此真可使頑懦聞之而興起矣司農卿嘗判洪州值大水城之不滅者十五水得城竇以入舉城惶擾不知所為公豫具薪藁不終日而障塞之城賴以全其為徳于梓里尤鉅北部司農各有集二十巻而司農兼工篆籀之學宋殿中丞李寅宅在府治南羊巷之東洪武間改為南昌左衛後併入都司寅又于東湖北建涵虚閣國初猶存王仲序涵虚閣詩有鸂鶒晴沙芳草外芙蓉秋水片雲中之句東湖别有涵虚亭唐宣宗時建至宋廢其址為環波亭輿地紀勝云亭下有釣磯洪邁作記豈此亭更名後李寅遂襲其舊而標之於閣上耶按李寅建安人有清節仕江南至諸司使宋初授官不拜子虚已登進士通判洪州迎養於署樂其山水清妙遂家焉弟虚舟以廕歴尚書虞部郎兄弟皆孝友清慎克世其家涵虚閣楊億有記富弼晏殊蘓洵皆有詩在宋初諸名賢流連其地不減元嬰之滕王閣也倦殻軒宋洪玉父炎軒名黄魯直題倦殻軒詩後曰洪氏四甥才器不同要之皆能獨秀於林者也潘大臨字邠老有倦殻軒詩云封胡羯末謝龜駒玉鴻洪千載望四謝四人天壤同時人以急口令譏之洪氏兄弟故宅今已莫識其處其見於紀載老鴻父有翛然堂龜父有清非齋玉父有照曠齋山谷俱為作銘玉父常有遷居詩云從官三十載故山凡幾歸昔歸尚有屋再歸巳傾欹今歸但喬朩竹落荆薪霏止為鸛鳥都不為雞犬棲相彼東北隅三畝以為基積塊與運甓實窪而培卑成兹道傍舍空我囊中資堂室取即安牖戸隨所宜嘉桐三四株當窻發華姿馨香入懷袖似與遷徙期我今六十老豈不知前非骨相似不媚况復筋力微收此衰病身與汝長相依松楸幸相望隣曲不相遺葛巾隨里社庶以報期頤按此玉父晚年乃居郡城東北隅所謂照曠齋者應即再歸傾圮之屋矣元祐黨碑文武共三百九人黄庭堅洪羽洪芻余爽余卞列餘官百七十七人之内皆豫章名士也崇寜中天下監司皆立此碑後因星變乃毁百家詩選云豫章洪氏山谷四甥皆以文詞知名朋字龜父同郡黄著集龜父詩百篇為一集山谷以為句句可傳也芻字駒父殫洽開豁溢於文詞擢諫議大夫為詩百餘篇著老圃前後集炎字玉父登第元祐之末試吏紹聖之初顯於宣和貴於紹興著西渡集一巻羽字鴻父元符之末上書入籍遂終其身兵火之後詩文無傳焉朝廷官其一子潘清逸宅在府城前舊中宫寺南本宋齊丘别業後為宋學士潘慎修所有慎修孫興嗣更築江月看經二臺及清逸樓巨松軒號一郡之勝興嗣字延之以父廕授將作監主簿與周敦頤王安石曾鞏王囘袁陟友善初調徳化尉謁江州刺史許瑊瑊倨不為禮興嗣投劾歸自號清逸居士屢薦不起隐處六十餘年手植朩皆大十圍盧志列之逸民誠南州之高士也吾豫章自徐孺子後獨有此君差可後先掩映著文集六十巻俱已散軼吕東萊選其爭論原諫通論送趙希道序周茂叔墓銘題張唐公香城記後七篇煜煜乎五緯之並麗足以峥嶸於天壤矣逍遥亭亦興嗣建自賦詩云作亭名逍遥此禮成不虚寛於一天下原憲惟桑樞况我卜清曠風雨庇有餘方池容瀲灧小徑足縈紆花朩頗窈窕松筠亦扶踈鳴蛙送鼓吹好鳥來笙竽可琴亦可詠可飲亦可娯盤雖無下筯賓食亦有魚恢論或申旦隐几忘移晡困來展足眠醉倒從人扶率爾但敷暢因煩而領無鄴架三萬軸方朔五車書棄置復棄置任自相賢愚無妨吾逍遥此樂誠何如吾郡在宋以任子傳者延之與陳恭公執中恭公當皇祐初召為吏部尚書同平章事秉政五年人不敢干以私四方問遺無及門者封岐國公致仕卒贈太師諡曰恭仁宗命張方平撰神道碑御書其額曰褒忠可謂明良遇合極一時之盛而延之抗志物表終老不出要不礙其並傳也恭公為右正言時王冀公深忌之一日真宗賦御溝柳詩宣示兩省皆令屬和恭公因進詩曰一度春來一度新翠光長得照龍津君王自愛天然色恨殺昭陽學舞人句意俱高惜其遺文無考耳宋郭祥正潘公園詩南昌城中潘令宅清逸樓高二千尺斜飛四角河漢躔密排萬瓦鴛鴦碧東湖居士宅宋樞密徐俯建俯字師川卜築東湖自號東湖居士黄山谷之從甥也繫年錄云金人欲帝張邦昌集百官議皆以次書名司門郎中徐俯獨不書持王時雍號慟大呼掛冠而去先時買一婢子名為昌奴遇朝士至即呼昌奴前驅使之宋高宗紹興二年十有二月右諌議大夫徐俯入對勸上熟讀光武紀上書以賜之曰卿近進言欲朕熟看世祖紀以益中興之治因思讀之十遍未若書一遍之為愈也先以一巻賜卿雖字惡甚無足觀者但欲知朕不廢卿之言耳俯因建亭湖上以藏御書紹興三年以徐俯簽書樞密院事故事簽樞下執政一等至是特詔鈞禮又例外賜以金帶秦檜專政以金人成和大赦天下俯方罷樞密提舉臨安府洞霄宫上表云禍福倚伏情偽多端恐未盡於事幾當復勞於聖慮時湖北京西宣撫使岳飛表云願定謀於全勝期收地於兩河唾手燕雲終欲復讎而報國矢心天地尚令稽首以稱藩知廣州連南夫表云雖虞舜之十二州昔皆吾有然商於之六百里當念爾欺三人表章一時皆盛相傳誦檜見而大惡之宋謙父宅故基今不可考謙父名自遜别號壺山居士金華人徙居南昌父子兄弟皆能詩而謙父尤著文筆亦高絶當代名流皆敬愛之方虚谷亟稱其殘年日易晚夾雪雨難消之句所著詩餘名漁樵笛譜灌園庵在三洲蘓圃林下偶談云蘓雲卿圃後屬郡人宋自適趙章泉題其室曰灌園庵自適字正父謙父之弟别號伏龍山民又構湖山清隐居於西山乃唐詩人陳陶故圃也宋丞相京鏜宅在府城錦衣坊嗚呼此即南唐宋齊丘之故址也仲逺何其似宋之甚北距徐孺子亭咫尺益令人輕纓緌而重布衣爾南州為宰相於宋者三人陳恭公執中京莊定鏜興分寜之章鑑也章固盛徳不幸而遭改玉遂致泯泯仲逺報謝金人弔䘮之役請免宴請撤樂侃侃昌言至脅以兵而不動何其壯耶一旦依附韓侂胄遂至敗盡生平恭公之介節正性自不必言當真宗倦勤時大臣莫敢及建儲事公獨進演易三篇以蚤定國本為說逾月遂建立太子此與韓魏公挾孔光傳以諷何異迨乎入參機務不招權勢不植黨與而又能急流勇退庶幾可稱全人恨不得褒忠碑一快讀以悉其建竪之始末也世美堂在郡城修仁坊宋端明殿學士兵部尚書豫章郡公李大性建大性以嘉定四年出守呉寜宗親書世美二字寵其行遂因以署堂額其曾祖諱積中者起家進士歴官殿中侍御史翰林學士列元祐黨人謫居吾郡遂家焉殿中生衛尉丞良弼衛尉生户部知徐州安國户部子七人豫章郡公其長子也次大異寶謨閣學士封豫章郡侯次大理知真州大柬江淮制置使亦封豫章郡公次大京知撫州次大成主管建昌仙都觀次大鎮朝奉郎一時父子兄弟持節剖符為公為侯先後相望洪武間太史蘓伯衡應其七世孫國子正宗頤之請追作世美堂記宗頤以薦辟官至禮部尚書熊天傭宅元豫章先生熊朋來建朋來豐城善坑人與其弟召子世連牆以居後徙家郡城每歸必舍召子所召子至郡城必舍朋來所兄弟自相師友如軾轍然朋來博通羣籍載于元文類者僅見一斑唐荆川稗編錄其論經學諸文皆世所未見予疑荆川先生家當有其全集屬友人訪之果然因覔傭書繕寫遭亂未遂所求今不知得免刼灰否杏花小隐居洪武中黄徳文所構朱善記曰豫章郡庠東有杏村焉望之而其氣之蔚如即之而其俗之醇如其中多隐君子昔之居是村者有黄陳二姓陳先生仲易既以經學為南北學者所宗而黄氏昆季伯善仲美復以文獻故家為貴游所重皆吾豐城產也伯善棄世其子徳文克紹前業闢一室曰杏花小隐日讀書其中取前朝名公鉅卿幽人處士所作詩文以類編之凡百餘巻而搜尋遺逸志猶未已焉按徳文所編不知何名勝國一代著作備具應與元文類並垂惜乎其竟不傳也仰高樓明初南昌羅徳厚建眺望西山峯巒歴歴朱學士善自遼海歸館於其家為作樓記云按圖志西山之高與廬阜等而諸峯競秀環三百餘里其巖洞之幽深泉石之清美竹箭之茂密草朩之靈異琳宫梵宇之相望良田名圃之相屬所産之富足以衣被城中十萬之衆其利澤之所及者逺矣抑吾因是有感焉是山之大能與廬阜同其高則斯人之居是邦者獨無與是山同其悠久者乎稽之古人忠節如梅子真高風如徐孺子孝友如黄太史固皆足以敦薄立懦乃若煜然道徳之光粹然言行之懿奮乎百世之上而百世之下靡不師法而宗仰之者其惟濂溪周子乎胡頤庵先生宅在進賢門外距南關半里許祭酒胡公儼之居大司冦蟠峯李公遷叙其集曰先生自㓜學即屬意元𣺌抗志崇竑探道徳之源窮性命之奥雖居會城闤闠然於天文地理罔不究子史丘索罔不讀其學則實學已斆華亭諸邑尹桐城若尺蠖之屈神龍之蟄何隐約也己而入禁廬承顧問代絲綸又何其榮顯也然處之若終身履之若固有完節榮問歸老東湖行則實行已所云㑹城闤闠即此處也先生賦豫章十景各五言律一章曰西山逺翠曰南浦飛雲曰徐亭烟柳曰蘓圃春蔬曰鐵柱仙蹤曰洪崖丹井曰滕閣秋風曰東湖夜月曰章江曉渡曰龍沙夕照後人用其題繪屏障屬和者甚衆國初吾郡之文潔淨莫如先生而或傷于率簡質莫如朱公善而或傷于淺然皆不失韓歐矩矱自王李出海内競以剽竊相高江右亦不免墮其雲霧比年稍知奉廬陵為不祧吾社二三兄弟返古之力要自不可誣爾先生重修府志序畧云豫章之有志始於雷次宗後其書亡南唐凃廙補撰豫章古今志時時引次宗舊記為證至宋洪芻字駒父謂廙書贍則近穢疎則及漏又時有牴牾非完書也乃掎摭書傳疏所見聞取其舊書析為十二部謂之職方乘元劉有慶潘斗元又補述續志凡十四巻然流傳不廣書久湮沒歴世既久人皆殘缺所謂郡之文獻誠不足徴也先生以水墨禿筆冩羊鹿甚生動亦能竹石蘭蕙其精於繪事又如此洵非一端可盡其長先生家食二十年年八十三而卒嘗自言詩文得法於鄉先生熊釗釗得之虞道園故其學有本原釗字伯幾富於著述有幾亭文集若干巻入國朝膺聘校書會同館為先生叙頤庵集亦自謂五六十年承事先輩得叙事書法之指要也范御史宅在惠民門外御史名敬先字思祖洪武初舉進士授監察御史指陳闕失無所忌諱一日忤㫖命磔諸市磔者己披其兩乳敬先曰姑無相廹吾將有所獻索筆札具草進上閱之一詩也為霽威命釋之遂失兩乳後以他事削籍還家乃賣卜於惠民門外貧不能餬口年八十餘卒如此御史而未有專祀彼爼豆纍纍者伊何人哉臨清軒在洗馬池北胡祭酒儼記云豫章洗馬池在子城東南隅舊傳為浴仙池事不經儒者不道郡志載潁陰侯灌嬰初定豫章常飲馬於此故名此或然也今在闤闠中與民居相接歲久隘塞廣不及半畝而深不至尋丈有司以為古蹟樹朩欄以䕶其三面而池之北則范仲華氏之所居作軒於池上名臨清張學士宅吏部左侍郎張東白先生元禎之居在黄牛洲土人云宅甚卑小清流廻繞鳬鷖在門今棟宇久已蕩盡想見先生進講文華孝宗設低几就聽之一時君臣遇合誠希有之盛事也吾郡貴顯在成𢎞間絶無創宅於郭内者嘉隆間㑹城始有甲第然率依典制規模梁棟斗拱無敢汰侈如冢宰熊公浹之在北城大司馬胡公訓之在南城其㕔事皆僅堪旋馬獨總漕司空呉公桂芳架雄壯屋頗為清議所譏至萬厯間則纔登膴仕便締層潭廣厦重軒繡栭雕䲽見者晃目驚心未幾土朩召禍兵甲頻仍不旋踵而俱畀之祝融矣子輿氏喚醒本心首致戒於宫室之美而堂高數仞榱題數尺徒博古人之輕藐士君子豈肯䘮名節於居處耶余徳甫先生宅在東湖傍南昌余憲副曰徳之居先生與吾郡王元美歴下李于鱗呉興徐子與武昌呉明卿揚州宗子相歙郡汪南溟結七子社一時名燥寰區後又與銅梁張肖甫及其弟助甫談詩元美所謂吾黨有三甫者是也子欽燿孫正垣皆以才華為詞壇推重正垣即予友小星也移居進賢門内扁其池上小圃曰昔耶園著有昔耶園詩集近時選家不録德甫先生隻字力以卑弱誚之殊非持平之論吾宗伯璣詩慰中極贊賞於小星古别離贈張公亮與撥悶諸篇於是人更遡厥淵源於迺祖矣詩之去取亦各從其所好也香月軒在進賢門内明張魯叟先生壽朋讀書處先生詩文超妙縱筆而往隨紙長短為盡而尤濡首於制蓺手自編集凡一千八百篇皆世所諷誦者其未刻尚萬有餘篇别有庸言史評筆訓約五六十巻今行世者僅深息窩詩十餘巻而已先清襄公擢操江旋里先生作十絶投贈其一云我亦羡君恬我亦羡君謙我獨胡狂躁非龍且好潛自云此實實向公前懺悔之語非套詞也前輩虚心樂善如此一日過予香蕉館索絹素大書曰垂老生涯也大奇擔頭詩筆與花枝販來春色憑君買一半梅花一半詩書訖擲筆扶杖而去枳園管理石城府事朱鬱儀先生謀瑋構雜花香草繽紛馥郁老樹偃蹇其間蕭然塵外先生把巻吟哦晨窻午夜亹亹忘疲雖朱邸猶之蓬戸也園中藏書甚富叠架連屋先生手所著作百餘種刻有書目堪與升庵鬭富予抄得二十餘種兵亂悉被抛擲僅存醫詮二十二篇黄岐鈎𤣥三十一篇其言曰戴人張子和探黄岐之妙用闡醫道之易簡所制方不過三十餘而可以該治萬千之病其要有三曰吐曰汗曰下而已矣然其書具存識之者寡愚夫闇士安於庸術坐視危篤乍聞三法莫不縮頸而咋舌豈知三法所以治病其所謂滋補調理之方助病為虐藉兵齎盗以糧也先生論醫真稱卓出千古其他方伎無不析其精妙而尤深於經學詳在予郡乘傳中其論厯學云往予觀大統厯思得其術弗得也得顧乃徳之說焉得潘塤之說焉得袁表之說焉非術也揣摩厯故而己矣乃發二十一史先之唐大衍厯焉繼之漢太初厯焉又繼之宋祖冲之厯焉隋劉焯張賓之厯焉得厯術矣而於大統之厯未合也繼乃究夫元史郭氏厯經焉又獲覩我朝夏官正劉信之厯法通經焉予於厯亦勞苦矣其論星學云五行家以日干為主視月令之休囚王相以裁成焉甲者陽朩成林之朩也乙者陰木方萌之朩也丙者陽火方燄者也丁者陰火伏于朩石中者也戊者燥土己者濕土庚者已煅之金辛者未煉之金壬者江河之水癸者雨露之水也甲恃庚以成材乙恃戊以得茂丙恃甲以不滅丁恃庚以得生戊能遏壬癸之勢癸能滋戊己之燥五行相須其𤣥妙有不可勝言者所謂才官印綬末世之技耳大抵五行貴乎中和失其中則資運氣以佐之故運氣亦在所重也丈夫以官為之子婦人以食為之男盖特封贈奉養之意誠鄙夫之陋見也甲無生庚之理丙無育壬之象庚不孳丙乙不乳辛惟戊已為土能産甲乙壬癸為水能澤戊己而已然丙乙得土丙丁得朩戊已得水未有乏夫嗣續者也以是而推其理彰矣論奇門遁甲云人有常言年吉不如月吉月吉不如日吉日吉不如時吉信有之也選時之例惟遁甲奇門為上六壬藏沒次之藏沒者一日之中惟四時可用若遇甲戊庚日則六神固藏四殺固沒矣他日則殺可藏而神不可沒若遁甲則十二時中奇儀星門各有所宜無施不可忌五不遇時避五入墓時而己其餘若有奇門無往不吉也胡舜申以陰陽備用符應經類集門要發其端倪郇慶長著為樞要分畫演之僕遂集此使開巻了然若奇與門俱不一得而以藏沒用之亦庶幾焉胡郇二公之言如此非僕臆說也謝肇淛曰今天下藏書之富王孫則開封睦挈南昌鬱儀兩家而己開封有萬巻堂書目余托友人謝于楚至其所鈔一二種皆不可得豈秘之耶南昌盖讀書者非徒藏也而巻帙不甚偹按睦挈字灌甫號西亭周定王之後覃精經學撰五經稽疑授經圖若干巻亦非僅以藏書名者鬱儀西亭皆能於聖學榛蕪之日孜孜魯壁汲冢之遺真當代劉子政也吾郡自鬱儀外宗侯則有時卿士庶則有熊仲舒喻季布而仲舒尤多帳中秘本滄桑以來土炕柳墻處處皆數家墳典而吾郡絃誦遂至輟響可勝嘆哉都督第在進賢門内大將軍劉公綎故宅公以家世名將好謀善戰威震海内東事亟從田間起用時經畧楊鎬素不相協公率健兒馳驅數千里而來甫解鞍鎬即麾之前進不得己與都督杜松分道疾驅連破數寨養子劉昭孫曰孤軍深入而援兵糗糧無一至奈何公曰汝視楊經畧豈復肯憖遺我輩耶報主致命得其所矣軍次清風山力戰而死鎬亦以失機坐辟崇禎初鎬年八十餘司冦據例當免烈皇曰全盛封疆壞於渠手此豈可引年以赦耶竟論如法吾郡以武功顯者晉則胡壯侯藩陳則黄威公法氍公智畧似藩勇敢似法氍萬厯五十年間聲名雷震一世殁之日華亭張侗初先生鼐檄海内文士作志士不忘在溝壑勇士不忘䘮其元制蓺以弔之操觚時多為之墮淚云明徐世溥劉將軍祠待客書感云奕世西南拓地聲中原只有杜齊名一呼氣作三軍膽百戰功高萬里城帶礪未酬恢井絡衣冠空殉應欃槍關西祠廟何如此夜作雙虹貫紫清登州檢討島新剙佛寺寺側一祠祀遼亡死事者劉杜張何而下俱列焉祠成地忽遍産五色芝碧色者居半或以為忠義熱血逐東風而迸灑于此也隻立軒在東嶽廟側明舒碣石先生曰敬建先生以制蓺名海内四方問業屨滿户外家食數十年荆門晝掩博極羣書嘗假予新呉吕公坤集把玩竟歲亟嘆賞其文以為可以救世其自序云天之未䘮斯文也則新吾先生當為今日之韓子予請附于籍湜諸人之後隆萬間江右以制萟傳者新建鄧文潔以讚臨川湯若士顯祖安福鄒泗山徳溥進賢李媿庵光元共先生而五迨臨汝陳艾章羅出海内或推置於五先生之上艾千子獨不然其說然學五先生不至未免威烈慎靚之奄奄學臨汝不至猶有桓文雄伯之氣故才士樂趨之而不厭至於坐明堂而奏韶濩朝諸侯則終以五先生為正統也古閒齋在東湖之東北大學士劉文端公一燝即先世舊廬構此公為庶常給假歸讀書其中者七載博覽羣籍靡不貫穿立朝端方廉介以身係安危者數十載為海内衆正領袖去國一疏傷楊左而詆客魏諸逆忠悃淋漓尺幅鄒忠介以為可與出師表並傳其生平詳載予重修郡乘惜未能廣搜遺文以傳也公為正詹掌翰林院嘗充東宫侍班官㑹開講公當請對乃書聨曰呼嵩稱萬壽盖用嵩山神呼漢武萬歲事併引詩言萬壽者闡揚其義時因挺擊欲摇國本借呼嵩義闡揚之以尊元良而規䕶儲君東宫對曰讀史惜三餘公拜手颺言以賀東宫乃光宗也公在政府日每語人曰言官恢張則六卿無實用善御者調六轡善治天下者任六官夫與天子行天下事者六官也六官任事而言路得以繩其愆言官陳事而政府得以裁其是則天下治于是一切條陳皆下六官有不經者詔格罷盖懲萬厯末年言官囂沸政府倒權天下日益多事故其持議如此芳樹齋在城隍廟前予友萬茂先徴君時華早歲讀書於此修廊矮屋雜植碧梧丹桂山茶玉蘭於前取徐文長鳥下窺書古花飛綴字紅之句題于檐楹芳樹齋詩之所為刻也後卜築溉湖遂名其集曰溉園頃兩地俱委蔓草殊增人樵車寂歴之感爾茂先文擬柳州古詩在陶韋間近體時義山時放翁要成茂先本色不拘拘叔敖之衣冠也其生平詳予敦宿堂萬徴君傳吾郡以諸生崇祀學宫者僅茂先而䘮亂之後朩主化為烏有亟當補入以留文範于異代茂先詩經偶箋微辭冷語真能令人解頤呉門己為重梓溉園詩賴吾宗伯璣評選可無遺珠之嘆􅍦文集刻板煨燼不無望棗棃之資于同志爾黎美周徐巨源俱為茂先作傳其生平胸懷蹈履惟光風霽月四字庶足以擬之太丘叔度之後吾未見有如此文士也義竹林在東湖上萬大司馬元吉與其弟給諫六吉縣尹九吉同居于此曰義竹者以此兄弟之連枝而交讓也司馬與予稱莫逆而給諫復與予同年辟舉道義切磋詩酒款洽月無虚日司馬每談及張許文陸忠烈事輒慷慨喜見眉宇卒能自踐其言今碧血未藏而故廬己成荒莽囘憶共金昆玉友歩月石欄聽鶯柳岸時真不禁涕泗之漣如也司馬字吉人給諫字次謙皆有文集傳世司馬理歸徳作定市價書絶類周官監武陵相國軍事歴盤谷涉侯趙川自河内至幽州凡所謂八陘者無不崎嶇攀陟作太行山圖說二書皆可備經濟實用未知世有藏本否浠湖相國宅在徳勝門内大學士新建姜公曰廣構郡人黄孝廉文旦曰相國年且高也自知非管樂比只拚這身子出來伴人作事不愛一死毫無顧惜此可謂誠忠然亦得死所矣半舫齋予友劉士雲文學斯陛之居傍有銀杏婆娑覆之逺近號為白果樹劉前為汎閣藏書多秘本跨池曰漪亭波光寒靜照人鬚眉士雲初刻半舫齋制萟已刻漪亭新萟筆勢雄快天風海濤震盪無際而蒼然古色不作耳目近玩其自草新萟序雋永而兼氣骨晉魏之名篇也惜才大如海而不克永年未能竟其所志為可嘆耳譚友夏有劉士雲園亭醉歌云世人為園丘壑假奇人為園中懷寫愛兹嘉卉成古朩主人坐我月明下垂楊拂水水荇開芳草上堦堦有苔吾家烟月遍林麓春光隨身千里來此夜歌聲細亦緩能飲不飲觴各滿章大力世純萬美叔曰佳甘禹符元鼎朱子强健余小星正垣朱子美徽李平叔曰奇俱曾讀書半舫齋而予與鄧孝廉履右徜徉其中最久禹符落第擬古樂府十四首徐巨源極相贊賞手為評閱付梓今竟無隻字之存而平叔左之之著作久己燼於爨下朱子美憲副自金陵歸得其兄所著蒼崖子亦以家食蕭條不能重鏤板也榆溪古魏元君煉丹地臨溪多榆故名去雲卿蘓圃僅數十步為郭内佳勝處予友徐巨源徴君世溥結廬其間所著詩文因名榆溪集巨源最愛江文通恨别諸賦而尤醉心韓嬰外傳以為嬰叙事澹蕩婉勁有司馬遷逸致迥出西漢諸家故其作愛秋光賦東湖漁者賦彷彿醴陵操觚而他文抑揚吐氣意在筆先有韓生之風焉晚廼力摹昌黎有酷肖者詩則少陵沉鬱昌谷奇麗時亦錯出見奇山居日久應酬諸文絶少予嘗語巨源祝詞始自虞伯生其壽兩尹先生序雄偉固足不朽此外如王陽明之壽湯雲谷歸震川之壽孫黙齋暨程白庵羅圭峯之壽彭彦寛歸季思之壽王孟夙母俯仰數百年僅此五六文足傳今連篇累牘穢而不慙真萟苑一阨君文無此殊令讀者六鑿清快巨源以為知言其後丁時之徴君仁宜作戒妄作詩文篇首及諛生以祝初度亦與予意相同巨源屢為盜苦竟死於盜死且甚慘生平著作烟雲蕩散天之苦文人抑何其毒虐至此耶巨源如芋談如本事詞皆㸃染風華為案頭所不可少而易正禮因則羽翼孔孟之書也昔之綠林豪客知珍重李涉之句而此盜乃以巨源著作畀投炎火抑豈能逃同輩之唾罵哉匡吾王府建安鎮國將軍朱多某之居家有女優可十四五人歌板舞衫纒綿婉轉生曰順妹旦曰金鳯皆善海鹽腔而小旦綵鸞尤有花枝顫顫之態萬厯戊子予初試棘闈塲事竣招十三郡名流大合樂於其第演繡襦記至斗轉河斜滿座二十餘人皆霑醉燈前拈韻屬和予詩有風振幽鳴花夢醒月寒香玉酒巡頻之句大為泰和曾端甫先生嘆賞一夕風流可數曾幾何時路隅寶玦散亂于秋雨梧桐而匡吾老人亦已厭世久矣子謀垔字禹卿能為五七言近體追琢不遺餘力刻有深柳居種園諸草犀齋予友蘓武子桓搆與徐巨源榆溪草廬密邇武子貧無立錐南大司徒馬公鳴起奇其文館之署中始獲結數椽奉母以居偶泛明聖湖適同里萬某為杭州太守武子投刺請見太守倨不為禮武子怒訶其門者太守遂繫之囹圄後知為大司徒客乃謝過出之武子不相見而去及武子已卒相國溧陽陳公名夏以其遺稿馳示相國金公之俊金遂作讀蘓武子遺稿序極其推揚嗟乎以同里而不知有國士以能文之宰相而心折於己朽之蓬茅人之度量相越果不可同年而語也自艾千子倡古文於天下茂先巨源和之摧陷廓清之功不小溧陽闡揚尤力駸駸乎足以起八代之衰矣及溧陽被刑海内競為徐庾駢偶取青嫓白金聲玉耀文益萎薾不振誠世道之憂也或曰溧陽冰蘗盟心何以致禍之烈曰昔洪武中宋學士濂以孫慎故獲罪安置茂州行抵䕫憩某寺與一高僧共語濂曰吾聞内典善惡必以類報吾平生所為自以為無愧何至是哉僧曰先生於勝國曾為官乎對曰翰林國子編修僧黙然濂是夜遂自縊觀此則溧陽固宜不免也鹿囿在章江門外陳友諒聚鹿數百於此嘗自跨一角蒼鹿綴琴珠為纓絡掛于角上縷金為花鞍羣鹿皆飾以錦繡遨遊江上明初駕至南昌宴於滕王閣上乃命儒臣賦詩放其所蓄鹿于西山友諒愛姬苕華夫人善月琴友諒出師必以隨呼為粧駕鹿囿其遊觀之地也友諒既亡有宫人小春逃於民間嫁蒲亭彭本清本清問陳氏宫中事小春言後庭數百人皆錦衣玉食用極奢侈又友諒喜食玉葉羮以西山羅漢菜及豐城曲江金花魚為之味頗佳章江驛在城西章江門古曰昌門漢建安中孫䇿遣虞翻與華歆交語即此處所稱石亭公館是也後改驛於廣潤門之南浦亭今為南浦驛渡江即石鎮舖舊又有石頭驛宋汪藻作記韓退之次石頭驛詩憑高囘馬首一望豫章城人由戀徳泣馬亦别羣鳴寒日夕始照江風逺漸平黙然都不語應識此時情退之詩朴率類如此然其惓惓於吾土直以并州為故鄉吾土寜能漠然於退之哉嘗欲構數椽於滕閣右祀子安退之于其間書以告後之議祀典者唐武徳中嘗以豫章之西境為西昌俾縣令治其地即今石鎮舖也吾邑稱西昌以此弋苑即北沙舊武塲邑人王仲序有詩云閲武臺前離思饒將軍長憶漢嫖姚沙明行伍龍蛇變風動旌旗組練飄禍亂幾經凋瘵日涓埃無補聖明朝向來俯仰俱陳迹頓使吟魂為客銷陳處士園在東湖南岸南唐處士陳陶隐居洪州闢小園植花竹種蔬茹日自灌溉陶有閒居雜興云一顧成周力有餘白雲閒釣五溪魚中原莫道無麟鳯自是皇家結網疎唐末自稱三教布衣開寶中人猶見之或云己得仙矣蟬聲將月短草色與秋長比屋歌黄竹何人撼白楊右張為取作主客圖陶題徐穉湖亭云伏龍山横洲渚地人如白蘋自生死洪崖成道二千年惟有徐君播青史釋貫休書陳陶隐居云有叟傲堯日髮白肌膚紅妻子亦讀書種蘭清溪東白雲有奇色紫桂含天風即應迎鶴外窅羡于洞洪又云高步前山前高歌北山北數載賣柑橙山資近又缺注陶種柑橙令山童賣之陶字嵩伯予嘗從英華類選諸編中手錄其句欲共施希聖肩吾詩合梓題曰西山二隐詳具予鴻桷集孫光憲云陶著癖書十巻聞其名而未嘗見之皆春園在東湖傍宋寜州章丞相鑑所闢竹石叢峙花朩疎野豐城王提舉義山請于章願得以娯老章慨然畀之為易其扁曰共春園義山字元高豐城人通易學兼工詞賦予藏有其稼村集詹詹小言而時有致至其易學未見也章號杭山度宗時為丞相立朝寛厚與人多許可士大夫目為滿朝歡居鄉以長者稱相隔四百年吾郡不復知分寜有此相矣杭山當元革命之後屏居山中布衣蔬食恬然也過毛竹山有句云不信世間陵谷變野樵偏識舊衣冠此豈不高於劉忠齋輩數倍哉南園在郡治之東南舊名桃源洞宋乾道中呉帥芾更築臺榭北園在郡治之東北直貢院前宋乾道中呉帥芾剙築東園在郡城東湖上直環波亭宋淳熙中張帥子顔剙築樂園即宋漕司花囿紹興中轉運判官趙竒符剙後運副汪召嗣余應求相繼增築至慶元年趙秘閣不迂牓曰樂園芙蓉園在府城東北嘉靖中瑞昌府奉國中尉朱多煃構多煃字用晦工為五七言詩與里人余憲副曰徳相倡和刻芙蓉園稿其同府鎮國中尉朱多􅖷字宗良亦博雅修詞與多煃齊名萬厯初諸王孫稱詩未有不屈指於宗良用晦者迨後七子一派海内羣相詆訶于是案頭有兩君之集者輒指而揶揄之然其於選體顔謝諸篇終未若兩君之精熟也閬園在永和門内李太虚宗伯明睿構弋陽王之舊邸也有山腰宫閣古石堂碧欄池浣花池天池諸跡公自言閬園以池勝以竹勝尤以松勝他園不敢望焉建聖沙樓藏書其中甲戌自華亭歸得宋板書一船皆上海潘文恪家舊藏每部有文恰公小像董𤣥宰手書子孫寶藏等字于䕶殻宗伯特構一小閣庋焉署曰宋板居龍沙古墓按水經注贑水北逕龍沙西沙甚潔白高峻而陁有龍形連亘五里舊俗九月九日升高處昔有人于此沙得故冢刻塼題云西去江七里半筮言其吉卜言其凶而今此冢垂沒于水所謂筮短龜長也慮志止採前三四語舊俗以下悉被刪去竊謂唐宋事文垂至今日已數倍于高曾之傳况其度越于此者而何忍其湮沒之乎道元生於後魏此冢不知葬自何時用筮龜而不用相墓之說則猶景純未著書之前事也周澹臺滅明墓在府城總持寺左宋紹興中漕使高述題曰有魯澹臺子羽之墓南平王鍾傅初入洪州命修一城軍使散掘墓甎以稱用工畢傅夢一人古服頎長貌如子路來詣傅曰將軍何得暴我居處覺問軍吏賓客莫有知者市老羅通入謁曰舊圖云城東南角三十一步有子羽先生墓甚靈恐軍人取甎有所觸犯傅使人視之果驗即命甃砌修飾更立亭于上以表古蹟既畢復夢致謝傅以束帛賞羅通焉漢徴士許劭墓在故松陽門内漢末中國大亂劭為揚州刺史劉繇奔豫章時大疫劭中路被病繇以舟先送劭至豫章㑹卒權殯於松陽門内因失其屍呉天紀二年太守呉興白日於㕔事恍惚見一人着黄巾練衣稱汝南許子將求葬因遂不見時皆莫知柩所在乃招魂葬之漢灌嬰墓在今順化門外二里許舊印土寺右寺今廢世傳為城隍墓漢徴士徐穉墓在進賢門外望仙寺東濱濠隧道深五尺墓居其中墓上石刻𨽻書漢南州高士徐孺子之墓酈道元云贑水歴白社西有徐孺子墓涂廙古今志墓在南門外尉㕔之側寰宇記墓道在郡城南十里號曰白社呉嘉禾中太守長沙徐熙於墓隧種松赤烏中太守南陽謝景立碑於墓側永安中太守梁郡夏侯嵩於碑旁立思賢亭後改名聘君亭宋南渡後南昌尉劍津張敬之因葺公㕔披榛墓出按圖牒墓旁有九里井求之得井又有甿耕桓伊墓下得甓三款識云晉南平將軍墓去聘君墓七里敬之乃表其墓復其亭元至正中行省參政東平徐琰識墓植垣明洪武中知府許方王莊相繼修理天順中左布政使黄琛即墓建祠𢎞治中府同知張汝舟重建仰高亭清風堂萬厯十五年知府范淶復修門堂塚墓竪漢高士寢路枋于衢側張九齡曲江文集有徐徴君墓碣并銘杜少陵讀其碑思整棹以弔之八哀詩云再讀徐孺碑猶思理烟艇其為常時傳誦如此唐陳陶詩郟鄏妖興炎漢衰先生南國卧明夷鳯凰屢降𤣥纁禮瓊石終藏烈火詩禁掖衣冠加宋鵲湖山耕釣沒堯師千年壠樹何人哭寂寞蒼苔内史碑明陳昂伯徐孺子墳詩削有朩蘭棹崩濤不我親晚停南浦驛先與徐墳隣每讀高士傳知為千載人清風二鼓後南斗掛秋旻郭璞墓舊傳在滕王閣東汙池内太平寰宇記云葬於江陰黄山不應有墓在此明知府陳國儒墓在府城總持寺傍國儒字邦民徽州人至正間任衢州路都事元兵破衢被執過新安賦詩以自誓至京不屈安置天戒寺以條自經為僕夫覺免無何仲子仲鏡䘮哭曰鏡死老親疇依天其奪予志乎數月召授内省都事歲餘除洪都太守期年政成坐事被繫因述生平出處自盡民撫屍而哭者接踵附葬徐孺子墓側有雪厓文集行世江城名蹟巻二
