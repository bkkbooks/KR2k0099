body:
  text: 江城名蹟巻四新建陳𢎞緒撰證今二滕王閣在府城西臨章江唐顯慶四年滕王元嬰都督洪州時建後都督閻伯嶼九日大宴宿命其壻呉子章作序以夸座客時絳州王勃省父交阯道出江西先一日次馬當去洪州七百餘里遇中元水府神以天風助之詰朝抵城下與宴閻公出紙筆徧請客莫敢當王勃慨然不辭閻公怒起更衣遣吏伺其文有句輒報及得落霞秋水之句乃矍然曰天才也請遂成之極歡而罷元和中袁州刺史韓愈有重修閣記記稱三王文詞即勃與王仲舒記王緒賦也大中間閣燬觀察使紇干衆重建韋慤記宋大觀元至元元統間累修前後撰記者左丞范致虚直學士姚燧學士虞集也明壬寅春正月高皇帝幸龍興開宴閣上命儒臣咸賦詩縱觀燈火懽遊連夕守臣檻陳友諒所蓄白鹿至命放之西山景泰間巡撫都御史韓雍因閣舊址築而廣之額曰西江第一樓萬厯二十七年巡撫都御史夏良心剙新閣於其右面直西山額曰高閣臨江崇禎間巡撫解學龍拓其臨江者而新之額曰環漪閣屬萬時華陳𢎞緒輯歴代詩文刻滕王閣集改革之際閣燬於兵順治十一年巡撫兵部侍郎兼都御史蔡公士英捐貲重建定為西向以攬江山之勝公自為記復徧徴海内詩文并前集彚刻之板藏按察司公署王子安九歲時得顔師古注漢書讀之作指瑕以摘其失十三作滕王閣序楊升庵引三國典畧曰蕭明與王僧辨書凡諸部曲並使招攜赴投戎行前後雲集霜戈電㦸無非武庫之兵龍甲犀渠皆是雲臺之仗唐王勃滕王閣序紫電青霜王將軍之武庫正用此事以十三歲之童子胸中萬巻千載之下宿儒猶不能知其出處豈非間世奇才杜子美韓退之極其推服之良有以也明柴惟放曰姚鉉選唐文不取滕王閣序盖其全集不入排耦之文及詩賦亦不入排律律詩則王勃之作原與選之意不合也宋王介甫詩白浪翻江無己時陳蕃徐孺去何之愁來徑上滕王閣覆取文公一片碑詩意似不滿子安閣序蘇子由亦有排語終倉猝之句不獨見刪於姚鉉也王子安唐時人如杜牧張喬曹松皆有滕王閣詩又李涉絶句云滕王閣上唱伊州二十年前向此遊半是半非君莫問西山長在水長流全首不事雕鏤而自然悽婉固是晚唐翹楚宋范成大云余至南昌登滕王閣其故基甚侈今但於城上作大堂耳𣙜酤又借以賣酒珮玉鳴鑾之罷久矣其下江面極濶雲濤浩然按石湖詩南渡時此閣乃在城上錄之以識滄桑廬陵文公天祥詩五雲窻戸瞰滄浪猶帶唐人翰墨香日月四時黄道濶江山一片畫圖長迴風何處搏雙雁凍雨誰人駕獨航迴首十年此飄泊閣前新柳己成行此詩一字不襲子安序而雄渾蒼勁直與少陵頡頏宋王平甫安國詩滕王平日好追遊高閣依然枕碧流勝地幾經興廢事夕陽偏照古今愁城中樹密千家市天際人歸一葉舟極目烟波吟不盡西山重叠亂雲浮時平甫年亦十三郡太守張侯見而異之為啓宴張樂於其上劉敏求字好古太和人號松菊老人題滕王閣云閣中環珮知何處帝子不來春欲暮鶯鳴烟柳樹摇風疑是當年舊歌舞古來興廢君莫嗟君看西山紅日斜西山不改舊顔色換盡行人與落霞山谷稱賞再三以此知名宋僧洪覺範有同世承世英世隆三伯仲蔡定國劉達道登滕王閣詩云承英連璧光照座更著阿隆如鼎安老兵先馳啓關鑰西山奔走登欄杆劉郎端黙自凝逺蔡侯奮髯齒牙寒但餘衰老百無用搜句倚欄方細看所謂承英三伯仲者乃郡城呉氏之子覺範集有次韻寄呉氏兄弟詩其畧云朱門連屬南昌郡東湖褒賢拔高峻西山捲簾入欄楯富貴遮人不容進我初見之不敢瞬呉家諸郎特風韻戱語嘲之終不慍筆峯落處風雷趁合覺範二詩觀之承英伯仲自非凡兒而郡志逸其名無從索之於緗素矣元虞文靖公集嘗宿寫韻軒辛好禮諸才子侍因進問曰西江登眺之所據江山之勝無踰於滕王閣望湖亭二處公不知其幾過皆不留題何也虞曰諸公曾見東坡及僧晦機二詩否請與諸公誦之晦機滕王閣詩云檻外長江去不囘檻前楊柳後人栽當時惟有西山在曾見滕王歌舞來其第一句言往事不可問也第二句言檻前楊柳亦是後人所栽第三四句謂當時曾見滕王歌舞者惟有西山在耳含蓄無限之意寓無窮之感東坡望湖樓詩云黒雲翻墨未遮山白雨跳珠亂入船巻地風來忽吹散望湖樓下水如天陰陽變化機關開闔於頃刻之間且氣雄語壯所謂吞雲夢者八九二詩皆不可及是以不曾有題明日虞與諸公登滕王閣即席賦詩若干首但記其三律與一絶耳其一曰高閣城頭戸牖開江中照見碧崔嵬文章誰復三王後雲氣長從五老來畫角數聲南斗落白鹽萬斛北風囘洲南先有蛟龍窟怪得詩成急雨催其二曰天寒江閣立蒼茫百尺欄杆送夕陽歲久魚龍非故物春深蛺蝶是何王帆檣星斗通南極車盖風雲擁豫章燈火夜歸湖上雨隔鄰呼酒說干將其三曰危樓百尺倚欄杆滿目青山不厭看空翠逺凝江樹小落霞飛送酒杯乾千年劍氣凌牛斗半夜天香下廣寒我欲乘鸞朝帝闕五雲深處是長安絶句云豫章城上滕王閣不見鳴鑾佩玉聲惟有當時簾外月夜深依舊照江城昔人云詩不可以茍作觀公之意可見矣此胡祭酒自謂得之呉用中云文靖又言㓜過豫章見滕王閣扁呉𫝊朋公所題也徘徊顧盼嘆其深穩端潤非近代所能及洪玉父舍人有侍兒名曰小九知書能為洪檢閱洪甚愛之嘗月夜攜登滕王閣賦詩云桃花浪裏散花樓南浦西山送客愁為理伊州十二叠緩歌聲裏看洪州後因兵亂失之洪悵恨不已又和前詩云西江江畔見江樓江月江風萬斛愁試問海潮應念我為將雙淚到南州已而洪復尋得其人為賦珠還合浦絶句十章明胡儼有閣賦曹學佺有七言古並稱佳作俱以篇長不能盡載布政使陳文燭雨中登閣詩云飛閣濛濛雨氣凉開樽風送百花香春深草色同鸚鵡江逺濤聲到鳯凰鳯凰章江灘名帝子豪華流水逝昔人麗藻落霞長誰言勝地逢難再喜得高朋數舉觴在衆作中此為探驪之珠矣江文忠萬里韓記跋云唐之文三變而至韓韓之文一倡而遂古絺章繪句如王所為則其未變時也未變之作雖先焉已有自我作古者突過其上孰能為先於古也哉萬里被命來洪敬取韓記大書特書之居中正位以示森嚴而沂沕穆王也姑附見焉豫章修滕王閣成監司舉落成宴于閣上呉康齋先生與弼便道偶過其下因書一絶云孺子亭空春草長忠臣祠老燕繁梁千門萬户皆沉夢何事虚空畫渺茫盖諷之也宴罷一廉訪見之訝曰此呉康齋先生筆隨命人追之己至謝埠矢强挽之卒不能返萬首唐詩載白樂天絶句云翠幙紅筵高在雲歌聲一曲萬家聞路人指㸃滕王閣看送江州白使君吾郡餞送嘗以此當陽關三叠而傳誦甚少詩亦有遇不遇耶明黎遂球滕王閣夜别徐巨源詩宋玉悲秋正黯然登臨送逺賦情牽半簾明月生高樹一縷微雲界淡天落水泛波舟趁葉浮燈接漢草如烟愁來我暫因風去高閣留君對昔賢遂球字美周番禺人多才藝而深信内典篤于聲氣每傾囊周人之緩急以薦授職方主事狥節於䖍城䖍城人合楊閣部廷麟萬司馬元吉姚侍郎奇𦙍龔驗封棻五人建祠祀之額曰五忠祠嶺北參藩周公體觀詩獨上膝王閣洪都勝勢開山連巴蜀逺江滙貢章來秋風吹城闕鄉心怯酒杯低徊辭賦客剩有仲宣才又賓筵開燕喜高閣集羣才勝地常如此王生安在哉江山傳藻麗棟宇繫徘徊聞有逍遥客丹書召不來蔡中丞彚刻吿竣方得此詩遂不及載入因記于此元趙孟頫書滕王閣序楊文貞為之跋萬厯間石刻則華林董宗伯其昌書崇禎間則王文學猷定書重建後則熊學博文登書昌黎記獨無佳書斷碑卧苔蘚中剥蝕遂無完字玉堂佳話云李昇水墨滕王閣圖合幅上畫人物宴集甚盛又南唐衛賢畫滕王閣景世稱工絶宋郭忠恕有滕王閣王勃揮毫圖載宣和畫譜嘉靖初巡撫陳洪謨於閣後建堂三間祀文文山謝叠山名曰二忠祠洪謨詩云文章氣節兩堪傳前有三王後二賢自是忠貞禆世敎從來人物孕山川撐扶宋室誰能並崇祀江鄉理則然蘋藻秋風瞻拜起巍巍北斗正高懸攬秀樓在布政司之左萬厯三十四年布政使陸長庚王佐伐石築基建樓其上俯瞰雉堞蒼翠四圍長江如帯城内之巨觀也臨川湯顯祖有賦右使丁繼嗣詩層層百尺瞰平蕪此日新成燕雀呼不盡岧嶤千障合却餘蒼莽萬花鋪風清月白時為主海濶天高故是吾拄笏大觀難再得接䍦狂倒莫須無右使來三聘詩雄峙洪都百尺樓簷楹飛壓大江流窗含萬井晴光麗簾捲千山爽氣浮吟嘯坐看庾亮月登臨興入杜陵秋風帆沙鳥何須羡北倚欄杆動杞憂鐘鼓樓在府治東南東湖上廣濟橋之南舊樓在東湖之西洪武間圮乃移普賢寺鐘鼓樓於此萬厯十六年知府范淶復修後燬於兵巡撫兵部侍郎蔡公士英重建萬司馬恭云豫章東湖之濱有岑樓焉崇可十尋博半之飛榱勒棟叢梲錯節聳東湖而隘西山若天柱焉不知何代所為風雨不圮霜雪不剝巔懸大鏞故老傳說宋末所鑄大二十圍重六百鈞舉之三年不可上有神僧過焉罵曰何不上乃以其緇衣服之紐其端復罵曰上上于是百人舁之一躍及巔今紐端緇服猶在按司馬所謂岑樓即舊鐘鼓樓其上有銅鑄巨鐘乃南唐林仁肇施非宋末也知府范淶詩共上高樓意若何樓中玉漏瞰金波雲霞半向疎櫺入蒼翠平臨逺樹多烟篆乍浮新棟宇鐘聲長滿舊山河凭欄問俗情無限不是尋常載酒過偰家樓在府治西北元末偰列篪闔門死難有司徙其樓于城上為遊觀之所一作薛家樓嘉靖間巡撫都御史何遷取陶淵明山氣日夕佳之語更名曰夕佳樓布政使陳文燭有夕佳樓記偰列篪字世徳龍興人父文質官于江西遂家焉列篪由翰林出監海潮州有惠政罷歸民留之不得至正間紅巾亂藩臣檄掌東門之管既奉命往别道士陳白雲曰予世為忠臣兵事不可測誓不辱國辱先請以身後為托歸具牲酒酧祖墓囑妻孥曰城倘不守爾等當即赴池井勿汙子賊城陷列篪遂投井死妻妾子女死者十有一人明日道士乃浚井竭池求屍具棺椁以葬聞者為之感慨𢎞緒洪乘編遺云偰家樓既改名夕佳李少文嗣京司理吾郡為復舊名而置偰公木主于其中請於撫按春秋致祭列篪死難事己見盧志但其記兄弟五人名殊未詳覈盖善著乃偰越倫之子雖登第而不在五人之列五桂坊所表則玉立直堅哲篤朝吾并列篪而五人也五人皆偰文質之子長玉立登延祐戊午第次直堅登泰定甲子第次哲篤登延祐乙卯第次朝吾登至治辛酉第最少者列篪登至順庚午第盧乃遺朝吾而以越倫之子當之謬矣明學使李夢陽偰家樓詩閒遊北城隅俯視清江郭洪州帶名都形勢日相錯樓觀藹鬱鬱街巷紛以漠北城良已高况陟城上閣輕裳拂倒影飛檻聆天樂春夕一何蒼夏潦彌井絡衝風擊􅂞流𤣥雲駭灘泊暗觀逝者危遂悟居者樂慷慨諒易感捫心果誰惡夷險非我為彈劍且盡酌萬時華詩朝登北城風怒號沙飛十丈寒雲高春鴻欲歸呼其曹樓頭歌管聲嘈嘈此地管絃朝復夕父老經過多太息城中少年那復知云是當年偰家室偰公生長自邊塵百花洲畔唫餘春秋風五桂散遥馥兄弟出入皆朱輪潮陽歸來遍紅巾翰林樹幟城東門堞摧櫓折鼓聲死清池湛湛哀英魂從者妻子十一人葬者道士陳白雲東風花開鎻空宅狐啼鼠竄無朝昏偰家之樓夕佳額滄桑轉眼悲行陌凭闌風物誰獨存章流靜照西山色城邊擊鼓白日低明月光中烏夜啼游人醉舞公獨悲霜天客散颺朱旗一朝幸遇李夫子為汝拂拭揚鬚眉樓頭歌舞如昔時樓下朩主公安之南州一片中華土節義晶晶亘今古後來孫許氣如虹日月河山共吞吐中原冦馬今復馳江南江北多鼓鼙公排帝閽叫閶闔為我擊賊綏蒸黎新貢院在進賢門内左布政使盧公震陽建并正學書院旌忠祠及旁近居民而締造之前有塔峰後有俯城阜於形象最稱秀傑為堂于中曰至公為堂于後曰協一為房曰京考曰房考為所曰受巻曰彌封曰謄錄曰對讀曰供給為樓于前曰明逺為樓于四隅曰瞭高凡故典所應有者罔不釐然畢具焉熊少宰文舉有重建碑記蔡公講堂在章江門外縉紳士庶為巡撫兵部侍郎兼副都御史蔡公士英特建以識去思郡人黎學使元寛有記京山堂先少保清襄公剙造先少保㕘劾逆璫魏忠賢掛冠歸里囊無長物僅遺京山數椽旋以饘粥不給鬻其半於鄰居又一載而鶴繡之袍燕居之服亦盡質之于錢家笥中遂無餘衣棄養後米公萬鍾為更其題曰思堂以識不肖孤風朩之痛而京山舊匾則移之於前㕔焉傍曰見山樓藏書八萬巻予寢食其中丹鉛靡間寒暑乙酉仲夏盡為鳩居營卒散擲溝壑幸存二萬巻輦至寒崕擇抄本二千餘巻别貯之石室戊子兵變鐵騎捆載而去兼以居民攫取遂蕩然無復枕篋之貯而予亦欲漸去筆硯從事於無何有之鄉矣𢎞緒所自著而現存者周易備攷四巻詩經解義八巻石莊集六巻恒山存稿二巻鴻桷篇四巻敦宿堂留書六巻峿齋詩集五巻山房讀書跋四巻咫聞編四巻寒崕餘論六卷荷鋤雜志十一巻豫章藝考六巻南昌郡乘五十五巻自著而燬於兵者明文類抄一百二十巻諸經存疑四十巻楸窻冗記十二巻洪乘編遺十巻熊吏部人霖見山樓雅集題詞云開言多煦社雨生寒花欲笑以還啼鶯怯飛而頻坐帷前草色有夢相通户外屐痕無風自掃舉頭見月快逢君子之光信足過門已入高人之室兄及弟矣莫逺具來子之好之不期而㑹寅階揖客竹影低襟子夜分杯花光漾酒已而欲窮逺目更陟危樓楚火微紅㸃綴魚舲夜色峯嵐淺碧飛來城闕春陰况復爆竹響中忽紙鳶之高舉風笳聲裏乍火樹以横披巷有康衢市無宵嘆斯則騷人之逸興狂士之深思良有不能自已焉者矣楚賦大風既多玖李瑶桃之報周詩小序聊為象瑜馬璧之光維旹丙子花朝後十日放生池在東湖之西唐光化二年都督張廷珪奏置北海太守李邕撰碑文百花橋在東湖北岸地名百花洲宋紹興間張澄建亭匾曰講武以習水軍洲畔有橋即以百花為名况志寜詩講武亭前水四流遊蜂飛蝶滿芳洲西風戰艦知何處贏得斜暉伴白鷗又波光清淺玉虹横過客誰題柱上名錦繡鋪張春色滿小車花外麗人行高士橋在府城跨東湖以近孺子宅故名俗呼高橋萬厯初范使君淶易名躍龍又以近兩邑學宫也國初中翰王仲序詩云橋列東湖隐素秋橋前故宅抱清流馬嘶波影青龍見魚戲簷陰紫貝浮題柱誰論支大厦濟川人意在南州臨分莫動河梁思把臂何年憶再遊草鞋橋在新城門外草鞋巷郡人胡文早䘮其婦年少守節甚苦身自織布以給食頭面恒不梳洗足著草鞋鄰里從其夫姓呼為胡草鞋每令人持布至橋橋上人爭買之曰此胡草鞋夫人布不二價者也李君子巷在蓼洲宋有李生者逸其名南昌人好義樂施每歲稔積穀社囷歉則和糴平凖里人賴之世亂集義勇以衛一方紹興間李成冦饒置家洪州生瞰成出率衆戮其妻子成恨甚下令致生不然且屠洪州既得生錮之於火神廟縛縶手足繫于巨板冦環守之期以旦日剖心祭亡魂衆各熟寢至夜半忽火神揷劍躍起割生左右縛生執劍自開餘縛雞鳴走出城南從筠州入楚迎岳飛兵討成大破之飛表生行軍長史不就人名其居為李君子巷秋屏閣在城北曾子固云豫章樓閣可盡西山勝覽者惟秋屏耳𢎞緒詩今古都消檻水聲後來何地又飛觥霜風吹醒無邊夢恰見西山渡口横投書渚在城西石頭渡殷羡投書於此羡字洪喬為豫章太守都下縉紳託羡致書者若干函行次石頭渡盡投水中曰沉者自沉浮者自浮洪喬不作致書郵其性之介如此江城名蹟巻四
